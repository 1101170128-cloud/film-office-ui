<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>指挥部文件管理系统</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;900&family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0e;
      --bg-light: #111118;
      --surface: #1a1a24;
      --surface2: #222230;
      --border: #2e2e3d;
      --primary: #00ff88;
      --primary-dim: rgba(0,255,136,0.12);
      --primary-glow: rgba(0,255,136,0.3);
      --secondary: #00d4ff;
      --accent: #c792ea;
      --warning: #ffd700;
      --danger: #ff4757;
      --text: #e8e8f0;
      --text-dim: #7070a0;
      --text-bright: #ffffff;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      font-family: 'Rajdhani', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Scan line overlay */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,255,136,0.02) 2px,
        rgba(0,255,136,0.02) 4px
      );
      pointer-events: none;
      z-index: 9999;
    }

    /* Layout */
    .layout {
      display: flex;
      min-height: 100vh;
    }

    /* Left Sidebar */
    .sidebar {
      width: 220px;
      background: var(--bg-light);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0; left: 0; bottom: 0;
      z-index: 100;
      transition: transform 0.3s;
    }
    .sidebar-brand {
      padding: 20px 16px;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-brand h1 {
      font-family: 'Orbitron', monospace;
      font-size: 13px;
      font-weight: 700;
      color: var(--primary);
      letter-spacing: 0.05em;
      line-height: 1.3;
    }
    .sidebar-brand p {
      font-size: 10px;
      color: var(--text-dim);
      margin-top: 4px;
    }
    .sidebar-nav { flex: 1; overflow-y: auto; padding: 8px; }
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 13px;
      color: var(--text-dim);
      border: 1px solid transparent;
      margin-bottom: 4px;
    }
    .nav-item:hover {
      background: var(--surface);
      color: var(--text);
    }
    .nav-item.active {
      background: var(--primary-dim);
      border-color: var(--primary-glow);
      color: var(--primary);
    }
    .nav-item.inactive { opacity: 0.5; }
    .nav-item .icon { font-size: 16px; width: 20px; text-align: center; flex-shrink: 0; }
    .nav-item .badge {
      margin-left: auto;
      background: var(--surface2);
      color: var(--text-dim);
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 10px;
    }
    .nav-item.complete .badge { background: var(--primary-dim); color: var(--primary); }

    .sidebar-footer {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      font-size: 10px;
      color: var(--text-dim);
    }

    /* Main Content */
    .main {
      flex: 1;
      margin-left: 220px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Top Bar */
    .topbar {
      background: var(--bg-light);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      height: 60px;
      position: sticky;
      top: 0;
      z-index: 50;
    }
    .hamburger {
      display: none;
      background: none;
      border: none;
      color: var(--text);
      font-size: 20px;
      cursor: pointer;
    }
    .search-bar {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 14px;
      max-width: 400px;
    }
    .search-bar input {
      flex: 1;
      background: none;
      border: none;
      color: var(--text);
      font-size: 13px;
      font-family: 'Rajdhani', sans-serif;
      outline: none;
    }
    .search-bar input::placeholder { color: var(--text-dim); }
    .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
    .status-dot {
      width: 8px; height: 8px;
      background: var(--primary);
      border-radius: 50%;
      box-shadow: 0 0 6px var(--primary);
    }
    .topbar-right span { font-size: 12px; color: var(--text-dim); }

    /* Content Area */
    .content { flex: 1; padding: 24px; }

    /* Dashboard Stats */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }
    .stat-card::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--primary), transparent);
    }
    .stat-card .stat-label {
      font-size: 11px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }
    .stat-card .stat-value {
      font-family: 'Orbitron', monospace;
      font-size: 28px;
      font-weight: 700;
      color: var(--primary);
    }
    .stat-card .stat-sub { font-size: 11px; color: var(--text-dim); margin-top: 4px; }
    .stat-card.danger .stat-value { color: var(--danger); }
    .stat-card.info .stat-value { color: var(--secondary); }
    .stat-card.warning .stat-value { color: var(--warning); }

    /* Module Detail Panel */
    .detail-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }
    .detail-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface2);
    }
    .detail-header h2 { font-size: 15px; font-weight: 600; font-family: 'Orbitron', monospace; color: var(--primary); }
    .detail-close {
      width: 28px; height: 28px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-dim);
      font-size: 16px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .detail-close:hover { border-color: var(--primary); color: var(--primary); }
    .detail-body { padding: 20px; }

    /* Upload Area */
    .upload-zone {
      border: 2px dashed var(--border);
      border-radius: 10px;
      padding: 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 16px;
    }
    .upload-zone:hover { border-color: var(--primary); background: var(--primary-dim); }
    .upload-zone .icon { font-size: 28px; margin-bottom: 6px; }
    .upload-zone .text { font-size: 13px; color: var(--text-dim); }
    .upload-zone .hint { font-size: 11px; color: var(--text-dim); opacity: 0.6; margin-top: 4px; }
    #file-input { display: none; }

    /* File List */
    .file-list { margin-bottom: 16px; }
    .file-list h4, .checklist h4 {
      font-size: 10px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 10px;
    }
    .file-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px;
      background: var(--bg-light);
      border-radius: 8px;
      margin-bottom: 6px;
      border: 1px solid var(--border);
    }
    .file-item .fi-icon { font-size: 18px; color: var(--secondary); }
    .file-item .fi-info { flex: 1; min-width: 0; }
    .file-item .fi-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .file-item .fi-meta { font-size: 11px; color: var(--text-dim); }
    .file-item .del-btn {
      width: 24px; height: 24px;
      border-radius: 6px; border: none;
      background: rgba(255,71,87,0.15);
      color: var(--danger);
      cursor: pointer;
      font-size: 13px;
      display: flex; align-items: center; justify-content: center;
      opacity: 0.7; transition: opacity 0.2s;
    }
    .file-item .del-btn:hover { opacity: 1; }
    .no-files { text-align: center; padding: 16px; font-size: 12px; color: var(--text-dim); }

    /* Checklist */
    .check-item {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }
    .check-item:last-child { border-bottom: none; }
    .check-dot {
      width: 20px; height: 20px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px;
      flex-shrink: 0;
      margin-top: 1px;
    }
    .check-dot.done { background: var(--primary-dim); color: var(--primary); }
    .check-dot.missing { background: rgba(255,71,87,0.15); color: var(--danger); }
    .check-item .ci-name { font-size: 13px; }
    .check-item .ci-file { font-size: 11px; color: var(--primary); margin-top: 2px; }
    .check-item .ci-ext { font-size: 10px; color: var(--text-dim); }

    /* Audit Log */
    .audit-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      margin-top: 24px;
    }
    .audit-section h3 { font-size: 12px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 14px; }
    .audit-item {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      font-size: 12px;
    }
    .audit-item:last-child { border-bottom: none; }
    .audit-item .ai-icon { color: var(--secondary); font-size: 14px; }
    .audit-item .ai-text { flex: 1; color: var(--text-dim); }
    .audit-item .ai-time { color: var(--text-dim); opacity: 0.6; font-size: 11px; }
    .audit-empty { text-align: center; padding: 12px; font-size: 12px; color: var(--text-dim); }

    /* Toast */
    .toast {
      position: fixed; bottom: 24px; right: 24px;
      background: var(--surface2);
      color: var(--text);
      padding: 12px 20px;
      border-radius: 10px;
      font-size: 13px;
      z-index: 1000;
      opacity: 0; transition: opacity 0.3s;
      pointer-events: none;
      border: 1px solid var(--border);
    }
    .toast.show { opacity: 1; }
    .toast.success { background: var(--primary); color: var(--bg); border-color: var(--primary); }
    .toast.error { border-color: var(--danger); color: var(--danger); }

    /* Detail Grid */
    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }

    /* Welcome/Default State */
    .welcome-state {
      text-align: center;
      padding: 60px 20px;
    }
    .welcome-state .icon { font-size: 48px; margin-bottom: 16px; opacity: 0.3; }
    .welcome-state h2 { font-family: 'Orbitron', monospace; font-size: 18px; color: var(--text-dim); margin-bottom: 8px; }
    .welcome-state p { font-size: 13px; color: var(--text-dim); opacity: 0.6; }

    /* Mobile */
    @media (max-width: 768px) {
      .sidebar { transform: translateX(-100%); }
      .sidebar.open { transform: translateX(0); }
      .hamburger { display: block; }
      .main { margin-left: 0; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .detail-grid { grid-template-columns: 1fr; }
      .topbar { padding: 0 16px; }
      .content { padding: 16px; }

      /* 手机端工作流区域 */
      .workflow-section { margin-top: 16px; }
      .workflow-list { gap: 8px; }
      .workflow-item { padding: 12px; }
      .workflow-steps { gap: 2px; }
      .workflow-step { height: 4px; }
      .workflow-actions { flex-wrap: wrap; gap: 6px; }
      .workflow-btn { flex: 1; min-width: 60px; padding: 6px 8px; font-size: 10px; }

      /* 手机端快捷操作网格 */
      .detail-panel .detail-body > div[style*="grid"] { grid-template-columns: repeat(2, 1fr) !important; gap: 8px; }

      /* 手机端QA输入 */
      .qa-input-row { flex-direction: column; gap: 8px; }
      .qa-input { width: 100%; }
      .qa-btn { width: 100%; }

      /* 手机端工作流创建表单 */
      .workflow-create-row { flex-direction: column; gap: 8px; }
      .workflow-create-row select, .workflow-create-row input { width: 100%; }
      .workflow-create-row button { width: 100%; }
    }

    /* 超小屏幕 (< 480px) */
    @media (max-width: 480px) {
      .stats-grid { grid-template-columns: 1fr; }
      .stat-card { padding: 14px; }
      .stat-value { font-size: 24px; }
      .detail-panel .detail-body > div[style*="grid"] { grid-template-columns: 1fr !important; }
      .qa-section { padding: 14px; }
      .workflow-item { padding: 10px; }

      /* 防止横向滚动 */
      html, body { overflow-x: hidden; }
      /* 增大触控区域 */
      .nav-item { padding: 12px 14px; min-height: 44px; }
      .workflow-btn { min-height: 36px; }
      /* 表单输入不自动缩放 */
      input, select, textarea { font-size: 16px !important; }
    }

    /* Overlay */
    .sidebar-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 99;
    }
    .sidebar-overlay.active { display: block; }

    /* Progress ring */
    .progress-ring { position: relative; display: inline-block; }
    .progress-ring-value { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; }

    /* Q&A Section */
    .qa-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 24px;
    }
    .qa-section h3 { font-size: 13px; color: var(--primary); margin-bottom: 14px; font-family: 'Orbitron', monospace; }
    .qa-input-row { display: flex; gap: 10px; margin-bottom: 14px; }
    .qa-input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      color: var(--text);
      font-family: 'Rajdhani', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    .qa-input:focus { border-color: var(--primary); }
    .qa-input::placeholder { color: var(--text-dim); }
    .qa-btn {
      background: var(--primary);
      color: var(--bg);
      border: none;
      border-radius: 8px;
      padding: 10px 20px;
      font-family: 'Rajdhani', sans-serif;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .qa-btn:hover { opacity: 0.85; }
    .qa-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .qa-response {
      background: var(--bg);
      border-radius: 8px;
      padding: 16px;
      font-size: 13px;
      line-height: 1.7;
      white-space: pre-wrap;
      display: none;
    }
    .qa-response.show { display: block; }

    /* 工作流追踪区域 */
    .workflow-section { margin-top: 24px; }
    .workflow-section h3 { font-size: 13px; color: var(--secondary); margin-bottom: 14px; font-family: 'Orbitron', monospace; }
    .workflow-list { display: flex; flex-direction: column; gap: 10px; }
    .workflow-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .workflow-header { display: flex; justify-content: space-between; align-items: center; }
    .workflow-name { font-size: 13px; font-weight: 600; color: var(--text); }
    .workflow-type { font-size: 11px; color: var(--text-dim); background: var(--surface2); padding: 2px 8px; border-radius: 4px; }
    .workflow-steps { display: flex; gap: 4px; align-items: center; }
    .workflow-step {
      flex: 1;
      height: 6px;
      border-radius: 3px;
      background: var(--surface2);
    }
    .workflow-step.completed { background: var(--primary); }
    .workflow-step.in_progress { background: var(--secondary); }
    .workflow-step.pending { background: var(--surface2); }
    .workflow-actions { display: flex; gap: 8px; margin-top: 6px; }
    .workflow-btn {
      padding: 4px 12px;
      font-size: 11px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--surface2);
      color: var(--text-dim);
      cursor: pointer;
      transition: all 0.2s;
    }
    .workflow-btn:hover { border-color: var(--primary); color: var(--primary); }
    .workflow-btn.complete:hover { border-color: var(--good); color: var(--good); }
    .workflow-empty { text-align: center; color: var(--text-dim); font-size: 12px; padding: 20px; }
    .workflow-create-form { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px; margin-top: 12px; }
    .workflow-create-row { display: flex; gap: 10px; margin-bottom: 10px; }
    .workflow-create-row select, .workflow-create-row input { flex: 1; padding: 8px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: 'Rajdhani', sans-serif; font-size: 13px; }
    .workflow-create-row button { padding: 8px 16px; background: var(--primary); color: var(--bg); border: none; border-radius: 6px; cursor: pointer; font-size: 12px; }
    .qa-response .qa-loading { color: var(--text-dim); text-align: center; padding: 8px; }
    .qa-sources { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); font-size: 11px; color: var(--text-dim); }
    .qa-sources a { color: var(--secondary); }
  </style>
</head>
<body>

<div class="layout">
  <!-- Sidebar Overlay (mobile) -->
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>

  <!-- Left Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <h1>指挥部文件管理系统</h1>
      <p>阳江发射场 · 内控管理</p>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav">
      <!-- filled by JS -->
    </nav>
    <div class="sidebar-footer">
      存储路径<br>/Users/mac/1301共享/阳江发射场
    </div>
  </aside>

  <!-- Main -->
  <main class="main">
    <!-- Top Bar -->
    <div class="topbar">
      <button class="hamburger" onclick="toggleSidebar()">☰</button>
      <div class="search-bar">
        <span style="color:var(--text-dim)">🔍</span>
        <input type="text" id="search-input" placeholder="搜索文件名或模块..." onkeydown="if(event.key==='Enter')doSearch()">
      </div>
      <div class="topbar-right">
        <div class="status-dot"></div>
        <span>在线</span>
      </div>
    </div>

    <!-- Content -->
    <div class="content" id="content-area">
      <!-- filled by JS -->
    </div>
  </main>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  const API = '/api/airport';
  let modules = [];
  let currentModule = null;

  function showToast(msg, type='default') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show ' + (type === 'success' ? 'success' : type === 'error' ? 'error' : '');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('sidebar-overlay').classList.toggle('active');
  }
  function closeSidebar() {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebar-overlay').classList.remove('active');
  }

  // Load dashboard
  async function loadDashboard() {
    try {
      const res = await fetch(`${API}/dashboard`);
      const data = await res.json();
      if (!data.success) return;
      const d = data.dashboard;
      renderSidebar(d.modules);
      renderDashboard(d);
    } catch(e) {
      document.getElementById('content-area').innerHTML = '<div class="welcome-state"><div class="icon">⚠️</div><h2>后端未连接</h2><p>请检查 Flask 服务是否运行</p></div>';
    }
  }

  function renderSidebar(modules) {
    const nav = document.getElementById('sidebar-nav');
    nav.innerHTML = modules.map(m => `
      <div class="nav-item ${!m.is_active ? 'inactive' : ''} ${m.is_active && m.complete ? 'complete' : ''} ${currentModule === m.key ? 'active' : ''}"
           onclick="openModule('${m.key}')">
        <span class="icon">${getModuleIcon(m.key)}</span>
        <span>${m.name}</span>
        <span class="badge">${m.uploaded_count}/${m.required_count}</span>
      </div>
    `).join('');
  }

  function getModuleIcon(key) {
    const map = {
      'expert-review': '🔬', 'design-change': '📐', 'procurement': '📋',
      'payment': '💰', 'material': '🏗️', 'subcontract': '👷',
      'visa': '📄', 'director-meeting': '🏛️'
    };
    return map[key] || '📁';
  }

  function renderDashboard(d) {
    const complete = d.modules.filter(m => m.is_active && m.complete).length;
    const totalMissing = d.modules.filter(m => m.is_active).reduce((s, m) => s + m.missing_count, 0);
    const todayUploads = d.audit_summary.today_uploads;
    const totalUploaded = d.total_uploaded;
    const totalRequired = d.total_required;

    document.getElementById('content-area').innerHTML = `
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-label">总体进度</div>
          <div class="stat-value">${d.overall_progress}%</div>
          <div class="stat-sub">${totalUploaded}/${totalRequired} 文件</div>
        </div>
        <div class="stat-card info">
          <div class="stat-label">今日上传</div>
          <div class="stat-value">${todayUploads}</div>
          <div class="stat-sub">文件数</div>
        </div>
        <div class="stat-card ${totalMissing > 0 ? 'danger' : 'success'}">
          <div class="stat-label">${totalMissing > 0 ? '进行中文档' : '暂无缺失'}</div>
          <div class="stat-value">${totalMissing}</div>
          <div class="stat-sub">${d.modules.filter(m => m.is_active).length} 个激活模块中</div>
        </div>
        <div class="stat-card warning">
          <div class="stat-label">已完成</div>
          <div class="stat-value">${complete}</div>
          <div class="stat-sub">/ ${d.modules.filter(m => m.is_active).length} 个激活模块</div>
        </div>
      </div>

      <div class="qa-section">
        <h3>🤖 智能问答 · 制度检索</h3>
        <div class="qa-input-row">
          <input type="text" class="qa-input" id="qa-input" placeholder="输入问题，例如：专家评审需要什么流程？"
                 onkeydown="if(event.key==='Enter')askQuestion()">
          <button class="qa-btn" id="qa-btn" onclick="askQuestion()">提问</button>
        </div>
        <div class="qa-response" id="qa-response">
          <div class="qa-loading">加载中...</div>
        </div>
      </div>

      <div class="detail-panel" style="margin-bottom:24px;">
        <div class="detail-header">
          <h2>⚡ 快捷操作</h2>
        </div>
        <div class="detail-body">
          <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;">
            ${d.modules.slice(0,4).map(m => `
              <div class="nav-item" onclick="openModule('${m.key}')" style="border:1px solid var(--border);border-radius:10px;">
                <span class="icon">${getModuleIcon(m.key)}</span>
                <span style="font-size:13px;">${m.name}</span>
                <span class="badge" style="margin-left:auto;">${m.progress}%</span>
              </div>
            `).join('')}
          </div>
        </div>
      </div>

      ${renderAuditLog(d.recent_uploads)}
    `;

    // 加载工作流列表
    loadAndRenderWorkflows();
  }

  function renderAuditLog(recentFiles) {
    return `
      <div class="audit-section">
        <h3>📋 最近操作</h3>
        ${recentFiles && recentFiles.length > 0
          ? recentFiles.slice(0, 8).map(f => `
            <div class="audit-item">
              <span class="ai-icon">📄</span>
              <span class="ai-text">${f.name}</span>
              <span class="ai-time">${f.upload_time || f.time}</span>
            </div>
          `).join('')
          : '<div class="audit-empty">暂无上传记录</div>'}
      </div>
    `;
  }

  // ===== 工作流追踪 =====
  async function loadAndRenderWorkflows() {
    const res = await fetch(`${API}/workflows`);
    const data = await res.json();
    if (!data.success) return;
    
    const res2 = await fetch(`${API}/workflows/types`);
    const typesData = await res2.json();
    
    const types = typesData.types || [];
    const workflows = data.workflows || [];
    
    const section = document.querySelector('.workflow-section') || createWorkflowSection();
    section.innerHTML = `
      <h3>🔄 工作流追踪</h3>
      <div class="workflow-list">
        ${workflows.length === 0 
          ? '<div class="workflow-empty">暂无进行中的工作流</div>'
          : workflows.slice(0, 5).map(w => `
            <div class="workflow-item">
              <div class="workflow-header">
                <span class="workflow-name">${w.name}</span>
                <span class="workflow-type">${w.type}</span>
              </div>
              <div class="workflow-steps">
                ${w.steps.map((s, i) => `
                  <div class="workflow-step ${s.status}" title="${s.name}: ${s.status}"></div>
                `).join('')}
              </div>
              <div style="font-size:11px;color:var(--text-dim);margin-top:4px;">
                ${w.steps[w.current_step]?.name || ''} (${w.current_step + 1}/${w.steps.length})
              </div>
              <div class="workflow-actions">
                <button class="workflow-btn" onclick="advanceWorkflow('${w.id}')">推进 →</button>
                <button class="workflow-btn complete" onclick="completeWorkflow('${w.id}')">完成 ✓</button>
                <button class="workflow-btn" onclick="deleteWorkflow('${w.id}')">删除</button>
              </div>
            </div>
          `).join('')}
      </div>
      <div class="workflow-create-form">
        <div style="font-size:12px;color:var(--text-dim);margin-bottom:8px;">+ 创建新工作流</div>
        <div class="workflow-create-row">
          <select id="wf-type-select">
            ${types.map(t => `<option value="${t.key}">${t.name}</option>`).join('')}
          </select>
          <input type="text" id="wf-name-input" placeholder="工作流名称，如：XXX项目变更">
          <button onclick="createWorkflow()">创建</button>
        </div>
      </div>
    `;
  }

  function createWorkflowSection() {
    const div = document.createElement('div');
    div.className = 'workflow-section';
    document.getElementById('content-area').appendChild(div);
    return div;
  }

  async function createWorkflow() {
    const type = document.getElementById('wf-type-select').value;
    const name = document.getElementById('wf-name-input').value;
    if (!name.trim()) { alert('请输入工作流名称'); return; }
    
    const res = await fetch(`${API}/workflows`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({type, name})
    });
    const data = await res.json();
    if (data.success) {
      document.getElementById('wf-name-input').value = '';
      loadAndRenderWorkflows();
    } else {
      alert('创建失败: ' + data.error);
    }
  }

  async function advanceWorkflow(id) {
    const res = await fetch(`${API}/workflows/${id}`, {
      method: 'PUT',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({action: 'advance'})
    });
    const data = await res.json();
    if (data.success) loadAndRenderWorkflows();
  }

  async function completeWorkflow(id) {
    const res = await fetch(`${API}/workflows/${id}`, {
      method: 'PUT',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({action: 'complete'})
    });
    const data = await res.json();
    if (data.success) loadAndRenderWorkflows();
  }

  async function deleteWorkflow(id) {
    if (!confirm('确认删除？')) return;
    const res = await fetch(`${API}/workflows/${id}`, {method: 'DELETE'});
    const data = await res.json();
    if (data.success) loadAndRenderWorkflows();
  }

  async function openModule(key) {
    closeSidebar();
    currentModule = key;

    // Update sidebar active state
    document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
    const navItems = document.querySelectorAll('.nav-item');
    navItems.forEach((el, i) => {
      if (modules[i] && modules[i].key === key) el.classList.add('active');
    });

    try {
      const res = await fetch(`${API}/module/${key}`);
      const data = await res.json();
      if (!data.success) { showToast('加载失败', 'error'); return; }

      const m = data;
      const c = m.compliance;
      const fileList = m.files || [];
      const missing = c.items.filter(i => i.status === 'missing');
      const done = c.items.filter(i => i.status === 'uploaded');

      document.getElementById('content-area').innerHTML = `
        <div class="detail-grid">
          <div>
            <div class="detail-panel" style="margin-bottom:16px;">
              <div class="detail-header">
                <h2>${getModuleIcon(key)} ${m.name}</h2>
                <button class="detail-close" onclick="loadDashboard()">✕</button>
              </div>
              <div class="detail-body">
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;">
                  <div style="background:var(--bg-light);padding:12px;border-radius:8px;text-align:center;">
                    <div style="font-size:22px;font-weight:700;color:var(--primary);">${done.length}</div>
                    <div style="font-size:11px;color:var(--text-dim);">已完成</div>
                  </div>
                  <div style="background:var(--bg-light);padding:12px;border-radius:8px;text-align:center;">
                    <div style="font-size:22px;font-weight:700;color:var(--danger);">${missing.length}</div>
                    <div style="font-size:11px;color:var(--text-dim);">待补充</div>
                  </div>
                </div>

                <div class="upload-zone" onclick="document.getElementById('file-input').click()">
                  <div class="icon">📎</div>
                  <div class="text">点击上传文件 · 支持批量</div>
                  <div class="hint">PDF · DOCX · XLSX · JPG · PNG</div>
                </div>
                <input type="file" id="file-input" onchange="handleUpload('${key}')" multiple>
              </div>
            </div>
          </div>

          <div>
            <div class="detail-panel">
              <div class="detail-header">
                <h2>📋 文件清单</h2>
              </div>
              <div class="detail-body">
                ${c.items.map(item => `
                  <div class="check-item">
                    <div class="check-dot ${item.status === 'uploaded' ? 'done' : 'missing'}">${item.status === 'uploaded' ? '✓' : '✕'}</div>
                    <div class="ci-name">${item.name}</div>
                    ${item.uploaded_file ? `<div class="ci-file">✓ ${item.uploaded_file}</div>` : ''}
                    <div class="ci-ext" style="margin-left:auto;flex-shrink:0;">${item.required_ext.join(' ')}</div>
                  </div>
                `).join('')}
              </div>
            </div>

            ${fileList.length > 0 ? `
              <div class="detail-panel" style="margin-top:16px;">
                <div class="detail-header"><h2>📂 已上传文件</h2></div>
                <div class="detail-body">
                  ${fileList.map(f => `
                    <div class="file-item">
                      <span class="fi-icon">📄</span>
                      <div class="fi-info">
                        <div class="fi-name">${f.name}</div>
                        <div class="fi-meta">${formatSize(f.size)} · ${f.time}</div>
                      </div>
                      <button class="del-btn" onclick="deleteFile('${key}','${f.name}')" title="删除">×</button>
                    </div>
                  `).join('')}
                </div>
              </div>
            ` : ''}
          </div>
        </div>
      `;
    } catch(e) {
      showToast('加载失败: ' + e.message, 'error');
    }
  }

  async function handleUpload(moduleKey) {
    const input = document.getElementById('file-input');
    const files = input.files;
    if (!files.length) return;
    let success = 0, failed = 0;
    for (const file of files) {
      const fd = new FormData();
      fd.append('file', file);
      try {
        const res = await fetch(`${API}/upload/${moduleKey}`, { method: 'POST', body: fd });
        const data = await res.json();
        if (data.success) { success++; }
        else { failed++; }
      } catch(e) { failed++; }
    }
    showToast(`已上传 ${success} 个${failed > 0 ? '，失败 '+failed : ''}`, success > 0 ? 'success' : 'error');
    input.value = '';
    await openModule(moduleKey);
    await loadDashboard();
  }

  async function deleteFile(moduleKey, filename) {
    if (!confirm('确认删除？\n' + filename)) return;
    try {
      const res = await fetch(`${API}/files/${moduleKey}/${encodeURIComponent(filename)}`, { method: 'DELETE' });
      const data = await res.json();
      if (data.success) {
        showToast('已删除', 'success');
        await openModule(moduleKey);
        await loadDashboard();
      } else {
        showToast(data.error || '删除失败', 'error');
      }
    } catch(e) { showToast('删除失败', 'error'); }
  }

  async function doSearch() {
    const q = document.getElementById('search-input').value.trim();
    if (!q) return;
    try {
      const res = await fetch(`${API}/search?q=${encodeURIComponent(q)}`);
      const data = await res.json();
      if (!data.success) return;

      const results = data.results || [];
      document.getElementById('content-area').innerHTML = `
        <div class="detail-panel">
          <div class="detail-header">
            <h2>🔍 搜索结果：${q}</h2>
            <button class="detail-close" onclick="loadDashboard()">✕</button>
          </div>
          <div class="detail-body">
            ${results.length === 0
              ? '<div class="no-files">没有找到匹配的文件</div>'
              : results.map(r => `
                <div class="file-item" style="cursor:pointer;" onclick="openModule('${r.module_key}')">
                  <span class="fi-icon">📄</span>
                  <div class="fi-info">
                    <div class="fi-name">${r.name}</div>
                    <div class="fi-meta">${r.module_name} · ${r.upload_time}</div>
                  </div>
                </div>
              `).join('')}
          </div>
        </div>
      `;
    } catch(e) { showToast('搜索失败', 'error'); }
  }

  function formatSize(bytes) {
    if (bytes > 1024*1024) return (bytes/1024/1024).toFixed(1)+'MB';
    return (bytes/1024).toFixed(0)+'KB';
  }

  // RAG Q&A
  async function askQuestion() {
    const input = document.getElementById('qa-input');
    const btn = document.getElementById('qa-btn');
    const resp = document.getElementById('qa-response');
    const q = input.value.trim();
    if (!q) return;

    btn.disabled = true;
    resp.className = 'qa-response show';
    resp.innerHTML = '<div class="qa-loading">正在检索制度文件...</div>';

    try {
      const res = await fetch(`${API}/guidance?q=${encodeURIComponent(q)}`);
      const data = await res.json();

      if (!data.success) {
        resp.innerHTML = '<div style="color:var(--danger);">检索失败：' + (data.error || '未知错误') + '</div>';
        return;
      }

      let html = data.guidance || '未找到相关指引。';

      // 高亮换行
      html = html.replace(/\n/g, '<br>');

      // 添加来源
      if (data.sources && data.sources.length > 0) {
        const srcList = data.sources.map(s =>
          `<div style="margin-top:6px;">📄 ${s.title} <span style="color:${s.relevance==='high'?'var(--primary)':s.relevance==='medium'?'var(--warning)':'var(--text-dim)'}">(${s.relevance} ${s.score})</span></div>`
        ).join('');
        html += `<div class="qa-sources">📚 参考文件：${srcList}</div>`;
      }

      resp.innerHTML = html;
    } catch(e) {
      resp.innerHTML = '<div style="color:var(--danger);">请求失败：' + e.message + '</div>';
    } finally {
      btn.disabled = false;
    }
  }

  // Init
  loadDashboard();
</script>
</body>
</html>
