<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Panel v2 - Advanced Memory Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&family=Exo+2:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --cp-bg: #0c0c0e;
            --cp-bg-light: #16161d;
            --cp-surface: #1e1e26;
            --cp-border: #282831;
            --cp-primary: #00ff88;
            --cp-secondary: #ff6b9d;
            --cp-accent: #c792ea;
            --cp-info: #00d4ff;
            --cp-warning: #ffd700;
            --cp-text: #e5e5e5;
            --cp-text-dim: #888899;
            --cp-text-bright: #ffffff;
            --cp-glow: rgba(0, 255, 136, 0.3);
            --cp-scanline: rgba(0, 255, 136, 0.03);
            --cp-bg-blur: 10px;
            /* RGB values for rgba() usage */
            --cp-bg-rgb: 12, 12, 14;
            --cp-surface-rgb: 30, 30, 38;
        }
        
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Rajdhani', sans-serif;
            background:
                var(--cp-bg-light);
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--cp-text);
            min-height: 100vh;
            line-height: 1.6;
            transition: background 0.3s ease, color 0.3s ease;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background:
                linear-gradient(135deg, rgba(var(--cp-bg-rgb, 12,12,14), 0.7) 0%, rgba(var(--cp-bg-rgb, 12,12,14), 0.6) 50%, rgba(var(--cp-bg-rgb, 12,12,14), 0.7) 100%),
                url('https://images-assets.nasa.gov/image/as17-146-22294/as17-146-22294~large.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            z-index: -2;
            transition: opacity 0.3s ease;
        }
        
        @keyframes flicker {
            0%, 100% { opacity: 1; }
            92% { opacity: 1; }
            93% { opacity: 0.8; }
            94% { opacity: 1; }
        }
        
        /* Scan line removed per user request */
        
        /* Floating particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
            overflow: hidden;
        }
        
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--cp-primary);
            border-radius: 50%;
            animation: float 8s infinite ease-in-out;
            opacity: 0.3;
        }
        
        .particle:nth-child(2) { left: 20%; animation-delay: -2s; background: var(--cp-accent); }
        .particle:nth-child(3) { left: 40%; animation-delay: -4s; background: var(--cp-info); }
        .particle:nth-child(4) { left: 60%; animation-delay: -6s; background: var(--cp-secondary); }
        .particle:nth-child(5) { left: 80%; animation-delay: -8s; }
        
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0.3; }
            50% { transform: translateY(-20px) rotate(180deg); opacity: 0.8; }
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background: rgba(var(--cp-bg-rgb, 12,12,14), 0.15);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            border: 1px solid var(--cp-border);
        }
        
        header {
            text-align: center;
            margin-bottom: 40px;
            padding: 30px 20px;
            border-bottom: 1px solid var(--cp-border);
            background: rgba(20, 20, 25, 0.5);
            backdrop-filter: blur(10px);
            border-radius: 12px;
        }
        
        .header-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 48px;
            font-weight: 700;
            background: linear-gradient(90deg, var(--cp-primary), var(--cp-info));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 4px;
            margin-bottom: 10px;
            text-transform: uppercase;
            text-shadow: 0 0 30px var(--cp-glow);
            animation: glow-pulse 2s ease-in-out infinite;
        }
        
        @keyframes glow-pulse {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.3); }
        }
        
        .header-subtitle {
            font-family: 'Rajdhani', sans-serif;
            font-size: 16px;
            color: var(--cp-text-dim);
            letter-spacing: 2px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .stat-card {
            background: linear-gradient(135deg, color-mix(in srgb, var(--cp-primary) 10%, transparent) 0%, color-mix(in srgb, var(--cp-info) 5%, transparent) 100%);
            backdrop-filter: blur(10px);
            border: 1px solid color-mix(in srgb, var(--cp-primary) 30%, transparent);
            border-radius: 8px;
            padding: 20px;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px var(--cp-glow), inset 0 0 20px rgba(0,0,0,0.1);
        }
        
        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--cp-primary), var(--cp-accent), var(--cp-info));
            box-shadow: 0 0 10px var(--cp-primary);
        }
        
        .stat-card:hover {
            border-color: var(--cp-accent);
            transform: translateY(-5px);
            box-shadow: 0 10px 40px var(--cp-glow), 0 0 25px var(--cp-glow);
        }
        
        .stat-card:hover::before {
            background: linear-gradient(90deg, var(--cp-accent), var(--cp-primary), var(--cp-info));
            box-shadow: 0 0 15px var(--cp-accent);
        }
        
        .stat-icon { 
            font-size: 24px; 
            margin-bottom: 10px; 
            filter: drop-shadow(0 0 8px currentColor);
        }
        
        .stat-title { 
            font-family: 'Rajdhani', sans-serif; 
            font-size: 12px; 
            color: var(--cp-text-dim); 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            margin-bottom: 8px; 
        }
        
        .stat-value { 
            font-family: 'Orbitron', monospace; 
            font-size: 28px; 
            font-weight: 700; 
            color: var(--cp-text-bright); 
            text-shadow: 0 0 15px var(--cp-primary), 0 0 30px rgba(0,255,136,0.3);
        }
        
        /* Nixie/glow tube style for time */
        .nixie-time { 
            font-family: 'Orbitron', monospace; 
            letter-spacing: 1px; 
            color: #00ff88; 
            text-shadow: 0 0 5px #00ff88, 0 0 12px #00ff88, 0 0 20px #00ff88, 0 0 40px rgba(0,255,136,0.5); 
        }
        .nixie-time.orange { 
            color: #ff9500; 
            text-shadow: 0 0 5px #ff9500, 0 0 12px #ff9500, 0 0 20px #ff7700; 
        }
        
        .main-content {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 30px;
        }
        
        .memory-section {
            background: rgba(var(--cp-surface-rgb, 30,30,38), 0.1);
            border: 1px solid var(--cp-border);
            border-radius: 8px;
            padding: 25px;
        }
        
        .controls-section {
            background: linear-gradient(135deg, color-mix(in srgb, var(--cp-info) 5%, transparent) 0%, color-mix(in srgb, var(--cp-primary) 3%, transparent) 100%);
            border: 1px solid var(--cp-border);
            border-radius: 8px;
            padding: 25px;
            box-shadow: 0 0 15px var(--cp-glow), inset 0 0 30px rgba(0,0,0,0.1);
        }
        
        .control-group { margin-bottom: 25px; }
        
        .control-label { 
            font-family: 'Rajdhani', sans-serif; 
            font-size: 13px; 
            color: var(--cp-info); 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            margin-bottom: 12px; 
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .control-label::before {
            content: '▸';
            color: var(--cp-primary);
            font-size: 10px;
        }
        
        .recent-activity {
            background: rgba(var(--cp-surface-rgb, 30,30,38), 0.1);
            border: 1px solid var(--cp-border);
            border-radius: 8px;
            padding: 25px;
            margin-top: 30px;
        }
        
        .section-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 20px;
            font-weight: 600;
            color: var(--cp-primary);
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--cp-border);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .memory-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: rgba(20, 20, 25, 0.5);
            backdrop-filter: blur(8px);
            border-radius: 8px;
            padding: 15px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        
        .memory-item {
            background: var(--cp-memory-bg, rgba(255,255,255,0.03));
            backdrop-filter: blur(5px);
            border: 1px solid var(--cp-memory-border, rgba(255,255,255,0.06));
            border-radius: 6px;
            padding: 20px;
            cursor: pointer;
            transform: perspective(1000px) rotateX(0deg) rotateY(0deg);
            transform-style: preserve-3d;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .memory-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, color-mix(in srgb, var(--cp-accent) 10%, transparent) 0%, transparent 50%, color-mix(in srgb, var(--cp-primary) 5%, transparent) 100%);
            border-radius: 6px;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }
        
        .memory-item:hover {
            border-color: var(--cp-accent);
            background: var(--cp-memory-hover-bg, rgba(255,255,255,0.08));
            transform: perspective(1000px) rotateX(5deg) rotateY(-5deg) translateZ(20px);
            box-shadow: 0 20px 40px color-mix(in srgb, var(--cp-accent) 30%, transparent), 0 0 30px color-mix(in srgb, var(--cp-accent) 20%, transparent);
        }
        
        .memory-item:hover::before { opacity: 1; }
        
        .memory-date { font-family: 'Share Tech Mono', monospace; font-size: 12px; color: var(--cp-info); margin-bottom: 8px; text-shadow: 0 0 5px var(--cp-info), 0 0 10px var(--cp-info); }
        .memory-title { font-family: 'Exo 2', sans-serif; font-size: 18px; font-weight: 600; color: var(--cp-text-bright); margin-bottom: 10px; }
        .memory-preview { font-size: 14px; color: var(--cp-text-dim); line-height: 1.6; margin-bottom: 15px; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        
        .memory-tags { display: flex; gap: 8px; flex-wrap: wrap; }
        .tag { font-family: 'Rajdhani', sans-serif; font-size: 11px; padding: 4px 12px; background: rgba(0,212,255,0.1); color: var(--cp-info); border: 1px solid var(--cp-info); border-radius: 4px; text-transform: uppercase; letter-spacing: 1px; }
        
        .controls-section { background: var(--cp-surface); border: 1px solid var(--cp-border); border-radius: 8px; padding: 25px; }
        .control-group { margin-bottom: 25px; }
        .control-label::before {
            content: '▸';
            color: var(--cp-primary);
            font-size: 10px;
        }
        
        .search-input {
            width: 100%;
            padding: 12px 15px;
            background: var(--cp-search-bg, rgba(0,10,15,0.6));
            backdrop-filter: blur(10px);
            border: 1px solid var(--cp-search-border, rgba(0,200,255,0.25));
            border-radius: 2px;
            color: var(--cp-text);
            font-family: 'Share Tech Mono', monospace;
            font-size: 14px;
            transition: all 0.3s ease;
            box-shadow: inset 0 0 15px var(--cp-search-shadow, rgba(0,200,255,0.05)), 0 0 10px var(--cp-search-glow, rgba(0,200,255,0.05));
            position: relative;
        }
        
        .search-input:focus {
            outline: none;
            border-color: var(--cp-search-border, rgba(0,200,255,0.5));
            box-shadow: 0 0 25px var(--cp-search-shadow, rgba(0,200,255,0.2)), inset 0 0 20px var(--cp-search-glow, rgba(0,200,255,0.08));
            background: var(--cp-search-bg, rgba(0,15,20,0.7));
        }
        
        .search-input::placeholder {
            color: var(--cp-search-placeholder, rgba(0,200,255,0.4));
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 12px;
        }
        
        .search-input:hover {
            border-color: var(--cp-search-border, rgba(0,200,255,0.4));
            box-shadow: 0 0 20px var(--cp-search-shadow, rgba(0,200,255,0.15)), inset 0 0 20px var(--cp-search-glow, rgba(0,200,255,0.05));
        }
        
        /* 搜索框扫描线效果 */
        .search-input::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(0,200,255,0.3), transparent);
            animation: scanline 2s linear infinite;
        }
        
        @keyframes scanline {
            0% { transform: translateY(0); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(40px); opacity: 0; }
        }
        
        .filter-buttons { display: flex; gap: 8px; flex-wrap: wrap; }
        
        /* 攻壳机动队风格按钮 - 赛博科技感 */
        .filter-btn {
            padding: 8px 16px;
            background: var(--cp-filter-btn-bg, linear-gradient(180deg, rgba(20,25,30,0.9) 0%, rgba(10,15,20,0.95) 100%));
            backdrop-filter: blur(10px);
            border: 1px solid var(--cp-filter-btn-border, rgba(0,255,200,0.3));
            border-radius: 3px;
            color: var(--cp-filter-btn-text, var(--cp-text-dim));
            font-family: 'Rajdhani', sans-serif;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.25s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
            position: relative;
            overflow: hidden;
        }
        
        .filter-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, var(--cp-filter-btn-glow, rgba(0,255,200,0.2)), transparent);
            transition: left 0.5s ease;
        }
        
        .filter-btn:hover::before {
            left: 100%;
        }
        
        .filter-btn:hover {
            border-color: rgba(0,255,200,0.6);
            color: var(--cp-primary);
            box-shadow: 0 0 15px rgba(0,255,200,0.2), inset 0 0 20px rgba(0,255,200,0.05);
            text-shadow: 0 0 8px var(--cp-primary);
        }
        
        .filter-btn.active { 
            background: linear-gradient(180deg, rgba(0,255,200,0.15) 0%, rgba(0,200,150,0.1) 100%);
            color: var(--cp-primary); 
            border-color: var(--cp-primary); 
            font-weight: 700;
            box-shadow: 0 0 20px rgba(0,255,200,0.3), inset 0 0 15px rgba(0,255,200,0.1);
            text-shadow: 0 0 10px var(--cp-primary);
        }
        
        .filter-btn:hover { 
            border-color: rgba(0,255,200,0.6); 
            color: var(--cp-text-bright); 
            background: rgba(0,255,200,0.15); 
            box-shadow: 0 0 15px rgba(0,255,200,0.2);
        }
        
        /* 攻壳风格语义搜索按钮 */
        .semantic-btn {
            background: linear-gradient(180deg, rgba(0,180,220,0.1) 0%, rgba(0,100,140,0.15) 100%);
            border: 1px solid rgba(0,200,255,0.4);
            min-width: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        
        .semantic-btn .btn-icon {
            font-size: 14px;
            color: var(--cp-info);
            text-shadow: 0 0 8px var(--cp-info);
        }
        
        .semantic-btn .btn-text {
            font-size: 11px;
            letter-spacing: 2px;
        }
        
        .semantic-btn:hover {
            border-color: var(--cp-info);
            box-shadow: 0 0 20px rgba(0,200,255,0.3), inset 0 0 25px rgba(0,200,255,0.08);
        }
        
        .semantic-btn:hover .btn-icon {
            color: var(--cp-info);
            text-shadow: 0 0 12px var(--cp-info);
        }
        
        .action-buttons { display: flex; flex-direction: column; gap: 15px; margin-top: 30px; }
        
        .action-btn {
            padding: 15px;
            text-align: center;
            background: linear-gradient(135deg, rgba(0,255,136,0.1) 0%, rgba(0,212,255,0.05) 100%);
            border: 2px solid var(--cp-primary);
            color: var(--cp-primary);
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            border-radius: 6px;
            box-shadow: 0 0 15px rgba(0,255,136,0.1), inset 0 0 20px rgba(0,255,136,0.03);
        }
        
        .action-btn:hover {
            background: linear-gradient(135deg, rgba(0,255,136,0.2) 0%, rgba(0,212,255,0.15) 100%);
            border-color: var(--cp-accent);
            color: var(--cp-text-bright);
            box-shadow: 0 0 25px rgba(0,255,136,0.4), inset 0 0 30px rgba(0,255,136,0.08);
            transform: translateY(-2px);
        }
        
        .action-btn.secondary { 
            border-color: var(--cp-info); 
            color: var(--cp-info); 
            background: linear-gradient(135deg, rgba(0,212,255,0.1) 0%, rgba(0,255,136,0.05) 100%);
        }
        
        .action-btn.secondary:hover { 
            background: rgba(0,212,255,0.2); 
            box-shadow: 0 0 25px rgba(0,212,255,0.4); 
        }
        
        .action-btn:hover { background: color-mix(in srgb, var(--cp-primary) 10%, transparent); box-shadow: 0 0 20px var(--cp-glow); transform: translateY(-2px); }
        .action-btn.secondary { border-color: var(--cp-info); color: var(--cp-info); }
        .action-btn.secondary:hover { background: rgba(0,212,255,0.1); box-shadow: 0 0 20px rgba(0,212,255,0.3); }
        
        @keyframes slideInUp {
            from { opacity: 0; transform: translateY(30px) rotateX(-20deg); }
            to { opacity: 1; transform: translateY(0) rotateX(0); }
        }
        
        .recent-activity { background: var(--cp-surface); border: 1px solid var(--cp-border); border-radius: 8px; padding: 25px; margin-top: 30px; }
        .activity-item { display: flex; align-items: center; gap: 15px; padding: 15px 0; border-bottom: 1px solid var(--cp-border); }
        .activity-icon { width: 36px; height: 36px; background: rgba(0,255,136,0.1); border: 1px solid var(--cp-primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--cp-primary); font-size: 16px; }
        .activity-details { flex: 1; }
        .activity-text { font-size: 14px; color: var(--cp-text); margin-bottom: 5px; }
        .activity-time { font-family: 'Share Tech Mono', monospace; font-size: 12px; color: var(--cp-info); text-shadow: 0 0 5px var(--cp-info), 0 0 10px var(--cp-info); }
        
        footer { text-align: center; margin-top: 40px; padding: 20px 0; border-top: 1px solid var(--cp-border); color: var(--cp-text-dim); font-size: 12px; }
        
        @media (max-width: 768px) {
            .main-content { grid-template-columns: 1fr; }
            .header-title { font-size: 28px; }
            .stats-grid { grid-template-columns: 1fr; }
        }
        
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes slideOut { from { transform: translateX(0); opacity: 1; } to { transform: translateX(100%); opacity: 0; } }
        
        /* File tree styles */
        .file-tree { background: rgba(var(--cp-surface-rgb, 30,30,38), 0.6); backdrop-filter: blur(8px); border: 1px solid var(--cp-border); border-radius: 8px; padding: 15px; margin-bottom: 20px; }
        
        /* Global scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.4); }
        ::-webkit-scrollbar-thumb { background: var(--cp-primary); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--cp-accent); }
        
        .tree-folder { margin-bottom: 15px; }
        
        /* 赛博朋克风格文件夹标题 */
        .tree-folder-header {
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 15px;
            background: linear-gradient(135deg, var(--cp-folder-bg, rgba(0,255,136,0.08)) 0%, color-mix(in srgb, var(--cp-info, #00d4ff) 5%, transparent) 100%);
            backdrop-filter: blur(8px);
            border: 1px solid var(--cp-folder-border, rgba(0,255,136,0.2));
            border-left: 3px solid;
            border-radius: 6px;
            transition: all 0.3s ease;
            font-family: 'Orbitron', sans-serif;
            font-size: 13px;
            letter-spacing: 1px;
            text-transform: uppercase;
            box-shadow: 0 0 10px var(--cp-folder-shadow, rgba(0,255,136,0.1));
        }
        
        .tree-folder-header:hover {
            background: linear-gradient(135deg, color-mix(in srgb, var(--cp-primary, #00ff88) 15%, transparent) 0%, color-mix(in srgb, var(--cp-info, #00d4ff) 12%, transparent) 100%);
            border-color: var(--cp-folder-border, var(--cp-accent));
            box-shadow: 0 0 20px var(--cp-folder-shadow, rgba(0,255,136,0.3)), inset 0 0 10px var(--cp-folder-bg, rgba(0,255,136,0.05));
            transform: translateX(5px);
        }
        
        .tree-folder-header i {
            font-size: 16px;
            filter: drop-shadow(0 0 5px currentColor);
        }
        
        .tree-folder-header span:first-of-type {
            font-weight: 700;
            text-shadow: 0 0 10px currentColor;
        }
        
        .tree-folder-header span:last-of-type {
            margin-left: auto;
            font-family: 'Share Tech Mono', monospace;
            font-size: 11px;
            background: var(--cp-folder-badge-bg, rgba(0,0,0,0.4));
            padding: 3px 8px;
            border-radius: 4px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .tree-folder-content {
            padding-left: 25px;
            max-height: 200px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--cp-primary) rgba(0,0,0,0.2);
            border-left: 1px dashed rgba(0,255,136,0.2);

        }
        
        .tree-folder-content::-webkit-scrollbar { width: 4px; }
        .tree-folder-content::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 2px; }
        .tree-folder-content::-webkit-scrollbar-thumb { background: var(--cp-primary); border-radius: 2px; }
        .tree-folder-content::-webkit-scrollbar-thumb:hover { background: var(--cp-accent); }
        
        /* 赛博朋克风格文件项 */
        .tree-file {
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            margin: 4px 0;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 4px;
            transition: all 0.3s ease;
            font-family: 'Share Tech Mono', monospace;
            font-size: 12px;
        }
        
        .tree-file:hover {
            background: linear-gradient(90deg, color-mix(in srgb, var(--cp-primary) 12%, transparent) 0%, color-mix(in srgb, var(--cp-info) 8%, transparent) 100%);
            border-color: var(--cp-primary);
            box-shadow: 0 0 15px var(--cp-glow);
            transform: translateX(3px);

        .tree-file i {
            font-size: 14px;

        .tree-file span {

        /* 攻壳风格 Loading */

        @keyframes typing {
            0%, 100% { content: '▌'; }
            25% { content: '▐'; }
            50% { content: '▌'; }

        }
        
        /* 语义搜索结果区域 */
        .semantic-results {
            background: rgba(0,20,30,0.5);
            border: 1px solid rgba(0,200,255,0.2);
            border-radius: 4px;

            margin-top: 20px;

        .semantic-results .result-header {
            color: var(--cp-info);
            font-family: 'Orbitron', sans-serif;
            font-size: 13px;
            letter-spacing: 2px;
            padding-bottom: 15px;

    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1 class="header-title">🧠 MEMORY PANEL v2</h1>
            <p class="header-subtitle">Sci‑fi Memory Management Interface</p>
            <div style="margin-top: 15px; display: flex; justify-content: center; align-items: center; gap: 15px; flex-wrap: wrap;">
                <select id="lang-select" onchange="switchLanguage(this.value)" style="padding: 8px 15px; background: rgba(0,0,0,0.4); border: 1px solid var(--cp-border); border-radius: 6px; color: var(--cp-text); font-family: 'Rajdhani', sans-serif; cursor: pointer;">
                    <option value="zh-CN">简体中文</option>

                </select>
                <div id="minimax-usage" style="display: flex; align-items: center; gap: 8px; padding: 6px 12px; background: rgba(0,10,15,0.5); border: 1px solid rgba(0,200,255,0.2); border-radius: 4px; font-family: 'Share Tech Mono', monospace; font-size: 11px; color: var(--cp-info);">

        <div class="stats-grid">

            <div class="stat-card">

        <div class="main-content">

                <div class="memory-list" id="memory-list">
                    <div class="memory-item">
                        <div class="memory-date">2026-03-20 14:30</div>

            <div class="controls-section">

                            <span class="btn-icon">⌬</span>

                        </button>
                    </div>
                </div>
                
                <div class="control-group">
                    <div class="control-label">筛选标签</div>
                    <div class="filter-buttons" id="tag-filters">
                        <button class="filter-btn active" data-tag="全部">全部</button>
                        <button class="filter-btn" data-tag="工作">工作</button>
                        <button class="filter-btn" data-tag="开发">开发</button>
                        <button class="filter-btn" data-tag="设计">设计</button>
                        <button class="filter-btn" data-tag="技术">技术</button>
                        <button class="filter-btn" data-tag="创意">创意</button>
                    </div>
                </div>
                
                <div class="control-group">
                    <div class="control-label">排序方式</div>
                    <div class="filter-buttons" id="sort-buttons">
                        <button class="filter-btn active">最新</button>
                        <button class="filter-btn">最旧</button>

                    </div>
                </div>
                
                <div class="action-buttons">
                    <button class="action-btn primary" id="brainstorm-toggle-btn" onclick="toggleBrainStorm()">🧠 BrainStorm</button>
                    <button class="action-btn secondary" onclick="refreshMemories()">🔄 刷新数据</button>
                    <button class="action-btn secondary" onclick="window.location.href='/model-panel'">🔙 模型面板</button>

                </div>

        <div class="recent-activity">
            <div class="section-title">📈 最近活动</div>
            <div class="activity-list" id="activity-list"></div>
        </div>
        
        <footer>
            <p>Memory Panel v2 - 赛博朋克风格记忆管理界面</p>
            <p style="margin-top: 5px; font-size: 11px;">© 2026 OpenClaw System Interface</p>
        </footer>
    </div>
    
    <script>
        let memoryData = [];
        let currentPage = 1;
        const itemsPerPage = 5;
        let filteredData = [];
        
        async function loadRecentActivity() {
            const container = document.getElementById('activity-list');
            try {
                // 读取最新的记忆文件作为最近活动
                const response = await fetch('/api/memory/files');
                const data = await response.json();
                
                if (data.success && data.files && data.files.length > 0) {
                    // 按日期排序（最新在前）
                    const sortedFiles = data.files.sort((a, b) => new Date(b.date) - new Date(a.date));
                    // 取最新的5个文件
                    const recentFiles = sortedFiles.slice(0, 5);
                    let html = '';
                    
                    recentFiles.forEach((file, index) => {
                        // 计算时间差
                        let fileDate = new Date(file.date);
                        // 如果日期无效，尝试从文件名解析
                        if (isNaN(fileDate.getTime())) {
                            // 尝试从文件名提取日期，如 2026-03-24.md
                            const match = file.name.match(/(\d{4}-\d{2}-\d{2})/);
                            if (match) {
                                fileDate = new Date(match[1] + 'T00:00:00');
                            }
                        }
                        const now = new Date();
                        const diffMs = now - fileDate;
                        const diffMins = Math.floor(diffMs / 60000);
                        const diffHours = Math.floor(diffMins / 60);
                        const diffDays = Math.floor(diffHours / 24);
                        
                        const t = i18n[currentLang];
                        let timeAgo;
                        if (isNaN(diffDays) || diffDays < 0) timeAgo = t.justNow;
                        else if (diffMins < 1) timeAgo = t.justNow;
                        else if (diffMins < 60) timeAgo = `${diffMins}${t.minsAgo}`;
                        else if (diffHours < 24) timeAgo = `${diffHours}${t.hoursAgo}`;
                        else timeAgo = `${diffDays}${t.daysAgo}`;
                        
                        html += `
                            <div class="activity-item">
                                <div class="activity-icon">📝</div>
                                <div class="activity-details">
                                    <div class="activity-text">${t.updated} ${file.name}</div>
                                    <div class="activity-time">${timeAgo}</div>
                                </div>
                            </div>
                        `;
                    });
                    
                    container.innerHTML = html;
                } else {
                    container.innerHTML = '<div class="activity-item"><div class="activity-text">暂无活动记录</div></div>';
                }
            } catch (e) {
                console.error('加载最近活动失败:', e);
                container.innerHTML = '<div class="activity-item"><div class="activity-text">加载失败</div></div>';
            }
        }
        
        async function loadMemoryFiles() {
            try {
                const response = await fetch('/api/memory/files');
                const data = await response.json();
                
                if (data.success && data.files) {
                    memoryData = [];
                    for (const file of data.files) {
                        const contentRes = await fetch(`/api/memory/read?path=${encodeURIComponent(file.path)}`);
                        const contentData = await contentRes.json();
                        
                        if (contentData.success) {
                            const lines = contentData.content.split('\n');
                            let title = '';
                            for (const line of lines) {
                                if (line.trim().startsWith('#')) {
                                    title = line.replace(/^#+\s*/, '').trim();
                                    break;
                                }
                            }
                            if (!title) title = file.name.replace('.md', '');
                            
                            const contentLines = contentData.content.split('\n').filter(l => !l.trim().startsWith('#'));
                            const content = contentLines.join(' ').replace(/[-*]/g, '').trim().substring(0, 100);
                            
                            // 标签关键词映射 (显示文本 -> key)
                            const tagKeywordMap = {
                                '工作': 'work', '开发': 'dev', '设计': 'design', '技术': 'tech', '创意': 'creative',
                                'bug': 'bug', '修复': 'fix', '优化': 'optimize', 'AI': 'ai', '系统': 'system'
                            };
                            const keywords = Object.keys(tagKeywordMap);
                            const foundTagKeys = [];
                            keywords.forEach(kw => {
                                if (contentData.content.toLowerCase().includes(kw.toLowerCase())) {
                                    foundTagKeys.push(tagKeywordMap[kw]);
                                }
                            });
                            const tags = foundTagKeys.length > 0 ? foundTagKeys.slice(0, 3) : ['system'];
                            
                            memoryData.push({
                                id: file.name,
                                date: file.date || 'Unknown',
                                title: title,
                                content: content + '...',
                                tags: tags,
                                path: file.path,
                                fullContent: contentData.content
                            });
                        }
                    }
                    renderMemories(memoryData);
                    updateStats();
                }
            } catch (e) {
                console.error('加载记忆失败:', e);
            }
        }
        
        function renderMemories(data) {
            filteredData = data;
            currentPage = 1;
            
            // 切换回记忆列表视图
            document.getElementById('memory-list').style.display = 'block';
            document.getElementById('brainstorm-content').style.display = 'none';
            
            renderPage();
        }
        
        function renderPage() {
            const container = document.getElementById('memory-list');
            container.innerHTML = '';
            
            if (filteredData.length === 0) {
                container.innerHTML = '<div style="text-align: center; padding: 40px; color: var(--cp-text-dim);">没有找到匹配的记忆</div>';
                return;
            }
            
            const start = (currentPage - 1) * itemsPerPage;
            const end = start + itemsPerPage;
            const pageData = filteredData.slice(start, end);
            
            pageData.forEach((item, index) => {
                const memoryEl = document.createElement('div');
                memoryEl.className = 'memory-item';
                memoryEl.style.animation = `slideInUp 0.3s ease ${index * 0.05}s both`;
                memoryEl.setAttribute('onclick', `showMemoryDetailById('${item.id}')`);
                memoryEl.innerHTML = `
                    <div class="memory-date">${item.date}</div>
                    <div class="memory-title">${item.title}</div>
                    <div class="memory-preview">${item.content}</div>
                    <div class="memory-tags">${item.tags.map(tag => `<span class="tag">${getTagDisplay(tag, currentLang)}</span>`).join('')}</div>
                `;
                container.appendChild(memoryEl);
            });
            
            // Add pagination controls
            const totalPages = Math.ceil(filteredData.length / itemsPerPage);
            if (totalPages > 1) {
                let paginationHtml = `<div style="display: flex; justify-content: center; gap: 10px; margin-top: 20px; align-items: center;">`;
                paginationHtml += `<button onclick="changePage(-1)" ${currentPage === 1 ? 'disabled' : ''} style="padding: 8px 16px; background: rgba(0,255,136,0.2); border: 1px solid var(--cp-primary); color: var(--cp-primary); border-radius: 4px; cursor: pointer;">◀ 上一页</button>`;
                paginationHtml += `<span style="color: var(--cp-text-dim);">${currentPage} / ${totalPages}</span>`;
                paginationHtml += `<button onclick="changePage(1)" ${currentPage === totalPages ? 'disabled' : ''} style="padding: 8px 16px; background: rgba(0,255,136,0.2); border: 1px solid var(--cp-primary); color: var(--cp-primary); border-radius: 4px; cursor: pointer;">下一页 ▶</button>`;
                paginationHtml += `</div>`;
                container.innerHTML += paginationHtml;
            }
        }
        
        function changePage(delta) {
            const totalPages = Math.ceil(filteredData.length / itemsPerPage);
            currentPage += delta;
            if (currentPage < 1) currentPage = 1;
            if (currentPage > totalPages) currentPage = totalPages;
            renderPage();
        }
        
        function updateStats() {
            document.getElementById('total-memories').textContent = memoryData.length;
            const tags = new Set();
            memoryData.forEach(item => item.tags.forEach(tag => tags.add(tag)));
            document.getElementById('total-tags').textContent = tags.size;
            document.getElementById('memory-count').textContent = memoryData.length;
        }
        
        function showMemoryDetail(item) {
            // Remove existing modal if any
            const existing = document.getElementById('memory-detail-modal');
            if (existing) existing.remove();
            
            const modal = document.createElement('div');
            modal.id = 'memory-detail-modal';
            modal.style.cssText = 'position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.8); display: flex; align-items: center; justify-content: center; z-index: 10000;';
            modal.onclick = (e) => { if (e.target === modal) modal.remove(); };
            
            modal.innerHTML = `
                <div style="background: var(--cp-surface); border: 1px solid var(--cp-border); border-radius: 12px; padding: 30px; max-width: 600px; width: 90%; max-height: 80vh; overflow-y: auto; position: relative;">
                    <button onclick="document.getElementById('memory-detail-modal').remove()" style="position: absolute; top: 15px; right: 15px; background: none; border: none; color: var(--cp-text-dim); font-size: 24px; cursor: pointer;">×</button>
                    <div style="color: var(--cp-text-dim); font-size: 14px; margin-bottom: 10px;">${item.date}</div>
                    <h2 style="color: var(--cp-primary); margin: 0 0 20px 0;">${item.title}</h2>
                    <div style="color: var(--cp-text); line-height: 1.8; white-space: pre-wrap;">${item.fullContent || item.content}</div>
                    <div style="margin-top: 20px; display: flex; gap: 8px; flex-wrap: wrap;">
                        ${item.tags.map(tag => `<span class="tag">${getTagDisplay(tag, currentLang)}</span>`).join('')}
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
        }
        
        function showMemoryDetailById(id) {
            console.log('点击记忆卡片，id:', id);
            console.log('memoryData 长度:', memoryData.length);
            const item = memoryData.find(m => m.id === id);
            console.log('找到的 item:', item ? item.title : '未找到');
            if (item) {
                showMemoryDetail(item);
            } else {
                console.error('未找到记忆卡片:', id);
                alert('未找到记忆卡片，请刷新页面重试');
            }
        }
        
        function toggleBrainStorm() {
            const btn = document.getElementById('brainstorm-toggle-btn');
            const brainstormContent = document.getElementById('brainstorm-content');
            const memoryList = document.getElementById('memory-list');
            
            if (brainstormContent.style.display === 'block') {
                // 当前在 BrainStorm 视图，返回记忆卡片
                console.log('返回记忆卡片视图');
                brainstormContent.style.display = 'none';
                brainstormContent.innerHTML = '';
                memoryList.style.display = 'flex';
                btn.innerHTML = '🧠 BrainStorm';
                btn.onclick = toggleBrainStorm;
            } else {
                // 当前在记忆卡片视图，进入 BrainStorm
                console.log('进入 BrainStorm 视图');
                loadBrainStorm();
                btn.innerHTML = '<i class="fas fa-arrow-left"></i> <span data-i18n="backToMemoryCards">返回记忆卡片</span>';
                btn.onclick = toggleBrainStorm;
            }
        }
        
        async function loadBrainStorm() {
            try {
                const filesRes = await fetch('/api/brainstorm/files');
                const filesData = await filesRes.json();
                
                if (filesData.success) {
                    displayBrainStormFileTree(filesData.files);
                }
            } catch (error) {
                console.error('加载 BrainStorm 失败:', error);
            }
        }
        
        function displayBrainStormFileTree(files) {
            const container = document.getElementById('brainstorm-content');
            const memoryList = document.getElementById('memory-list');
            const t = i18n[currentLang];
            
            // 隐藏记忆列表，显示 BrainStorm 内容
            memoryList.style.display = 'none';
            container.style.display = 'block';
            
            // 按类型分组
            const groups = {
                'memory': { name: t.longTermMemory || '🧠 长期记忆', files: [], icon: 'fa-brain', color: '#00ff88' },
                'state': { name: t.currentState || '📍 当前状态', files: [], icon: 'fa-map-marker-alt', color: '#00d4ff' },
                'insight': { name: t.insights || '💡 洞察总结', files: [], icon: 'fa-lightbulb', color: '#c792ea' },
                'raw': { name: t.workLog || '📝 工作日志', files: [], icon: 'fa-file-alt', color: '#ffd700' },
                'sync': { name: t.syncArchive || '同步归档', files: [], icon: 'fa-cloud-upload-alt', color: '#ff9f43' },
                'group': { name: t.groupMemory || '👥 群组记忆', files: [], icon: 'fa-users', color: '#888899' },
                'todo_active': { name: t.todos + ' - ' + (t.todoActive || '进行中'), files: [], icon: 'fa-tasks', color: '#ff9f43' },
                'todo_completed': { name: t.todos + ' - ' + (t.todoCompleted || '已完成'), files: [], icon: 'fa-check-circle', color: '#aaaaaa' },
                'stash': { name: t.stash || '📦 Stash 缓存', files: [], icon: 'fa-box', color: '#ff6b6b' },
                'other': { name: '📁 其他', files: [], icon: 'fa-folder', color: '#aaaaaa' }
            };
            
            files.forEach(file => {
                const type = file.type || 'other';
                if (groups[type]) {
                    groups[type].files.push(file);
                } else {
                    groups.other.files.push(file);
                }
            });
            
            let html = `
                <h3 style="margin-bottom: 20px; color: var(--cp-primary);">
                    <i class="fas fa-folder-tree"></i> ${t.brainstorm || 'BrainStorm'}
                </h3>
                <div class="file-tree">
            `;
            
            // 按顺序显示分类
            const order = ['insight', 'memory', 'state', 'raw', 'sync', 'group', 'todo_active', 'todo_completed', 'stash', 'other'];
            for (const key of order) {
                const group = groups[key];
                if (group.files.length === 0) continue;
                
                html += `
                    <div class="tree-folder">
                        <div class="tree-folder-header" onclick="toggleFolder(this)" style="border-left-color: ${group.color}; color: ${group.color};">
                            <i class="fas ${group.icon}"></i>
                            <span style="font-weight: 700;">${group.name}</span>
                            <span style="font-family: 'Share Tech Mono', monospace; font-size: 11px; background: rgba(0,0,0,0.4); padding: 3px 8px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.1);">(${group.files.length})</span>
                        </div>
                        <div class="tree-folder-content" style="display: none;">
                `;
                
                group.files.forEach(file => {
                    // 待办事项使用不同的点击行为
                    if (file.type === 'todo_active' || file.type === 'todo_completed') {
                        const todoId = file.path.split('/')[1];
                        const isCompleted = file.type === 'todo_completed';
                        const action = isCompleted ? 'uncomplete' : 'complete';
                        html += `
                            <div class="tree-file" onclick="toggleTodo('${todoId}', '${action}')" style="border-color: ${group.color}; cursor: pointer;">
                                <i class="fas ${isCompleted ? 'fa-check-circle' : 'fa-square'}" style="color: ${group.color};"></i>
                                <span style="flex: 1; font-family: 'Share Tech Mono', monospace; font-size: 12px; letter-spacing: 0.5px; ${isCompleted ? 'text-decoration: line-through; opacity: 0.6;' : ''}">${file.name}</span>
                                ${file.due ? `<span style="font-size: 10px; color: #888; margin-left: 10px;">⏰ ${file.due}</span>` : ''}
                            </div>
                        `;
                    } else {
                        html += `
                            <div class="tree-file" onclick="loadBrainStormFile('${file.path}')" style="border-color: ${group.color};">
                                <i class="fas fa-file-alt" style="color: ${group.color};"></i>
                                <span style="flex: 1; font-family: 'Share Tech Mono', monospace; font-size: 12px; letter-spacing: 0.5px;">${file.name}</span>
                            </div>
                        `;
                    }
                });
                
                html += '</div></div>';
            }
            
            html += `
                </div>
                <div id="brainstorm-preview" style="margin-top: 20px; display: none;"></div>
            `;
            
            container.innerHTML = html;
        }
        
        function toggleFolder(header) {
            const content = header.nextElementSibling;
            const icon = header.querySelector('i');
            if (content.style.display === 'none') {
                content.style.display = 'block';
                icon.classList.remove('fa-folder');
                icon.classList.add('fa-folder-open');
            } else {
                content.style.display = 'none';
                icon.classList.remove('fa-folder-open');
                icon.classList.add('fa-folder');
            }
        }
        
        async function loadBrainStormFile(path) {
            try {
                const response = await fetch(`/api/brainstorm/read?path=${encodeURIComponent(path)}`);
                const data = await response.json();
                
                if (data.success) {
                    const previewDiv = document.getElementById('brainstorm-preview');
                    previewDiv.style.display = 'block';
                    previewDiv.innerHTML = `
                        <div style="background: rgba(var(--cp-surface-rgb, 30,30,38), 0.9); border: 1px solid var(--cp-primary); border-radius: 8px; padding: 20px; box-shadow: 0 0 20px var(--cp-glow);">
                            <h4 style="color: var(--cp-primary); margin-bottom: 15px; font-family: 'Orbitron', sans-serif; font-size: 14px;">
                                <i class="fas fa-file-alt"></i> ${path}
                            </h4>
                            <pre style="white-space: pre-wrap; font-size: 13px; max-height: 400px; overflow-y: auto; background: rgba(0,0,0,0.4); padding: 15px; border-radius: 4px; font-family: 'Share Tech Mono', monospace; color: var(--cp-text); line-height: 1.6;">${escapeHtml(data.content)}</pre>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('加载文件失败:', error);
            }
        }
        
        // 切换待办状态
        async function toggleTodo(todoId, action) {
            try {
                const response = await fetch(`/api/todos/${todoId}/${action}`, { method: 'POST' });
                const data = await response.json();
                if (data.success) {
                    // 重新加载 BrainStorm 列表
                    loadBrainStorm();
                }
            } catch (error) {
                console.error('切换待办状态失败:', error);
            }
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function getActiveTag() {
            const activeBtn = document.querySelector('#tag-filters .filter-btn.active');
            const tag = activeBtn ? activeBtn.getAttribute('data-tag') : null;
            const isAll = tag === '全部' || tag === 'All' || tag === '全部' || tag === null;
            return isAll ? null : tag;
        }
        
        function filterMemories(query, tag) {
            let filtered = memoryData;
            if (query) {
                const q = query.toLowerCase();
                filtered = filtered.filter(item => item.title.toLowerCase().includes(q) || item.content.toLowerCase().includes(q));
            }
            if (tag && tag !== '全部') {
                filtered = filtered.filter(item => item.tags.some(t => t.toLowerCase() === tag.toLowerCase()));
            }
            renderMemories(filtered);
        }
        
        function setupEventListeners() {
            const searchInput = document.querySelector('.search-input');
            searchInput.addEventListener('input', (e) => {
                filterMemories(e.target.value, getActiveTag());
            });
            
            document.querySelectorAll('#tag-filters .filter-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('#tag-filters .filter-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    const tag = btn.getAttribute('data-tag');
                    const isAllTag = tag === '全部' || tag === 'All' || tag === '全部';
                    filterMemories(searchInput.value, isAllTag ? null : tag);
                });
            });
            
            document.querySelectorAll('#sort-buttons .filter-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('#sort-buttons .filter-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    if (btn.textContent === '最新') memoryData.sort((a, b) => new Date(b.date) - new Date(a.date));
                    else if (btn.textContent === '最旧') memoryData.sort((a, b) => new Date(a.date) - new Date(b.date));
                    renderMemories(memoryData);
                });
            });
        }

        function switchLanguage(lang) {
            currentLang = lang;
            const t = i18n[lang];
            // Header
            document.querySelector('.header-title').textContent = '🧠 ' + t.memoryPanel;
            document.querySelector('.header-subtitle').textContent = t.subtitle;
            // Stats
            const statTitles = document.querySelectorAll('.stat-title');
            if(statTitles[0]) statTitles[0].textContent = t.memoryFiles;
            if(statTitles[1]) statTitles[1].textContent = t.tags;
            if(statTitles[2]) statTitles[2].textContent = t.recentUpdate;
            if(document.getElementById('recent-update-today')) document.getElementById('recent-update-today').textContent = t.today;
            // Section title
            const sectionTitle = document.querySelector('.memory-section .section-title');
            if(sectionTitle) sectionTitle.innerHTML = '📚 ' + t.memoryLib + '<span style="font-size: 12px; color: var(--cp-text-dim); margin-left: auto;">' + t.total + ' <span id="memory-count">' + memoryData.length + '</span></span>';
            // Controls
            const controlLabels = document.querySelectorAll('.control-label');
            if(controlLabels[0]) controlLabels[0].textContent = t.search;
            if(controlLabels[1]) controlLabels[1].textContent = t.filterTag;
            if(controlLabels[2]) controlLabels[2].textContent = t.sortBy;
            // Search input placeholder
            const searchInput = document.getElementById('search-input');
            if(searchInput) searchInput.placeholder = t.searchPlaceholder || '';
            // Recent activity
            const recentTitle = document.querySelector('.recent-activity .section-title');
            if(recentTitle) recentTitle.textContent = '📈 ' + t.recentActivity;
            // Filter buttons (标签筛选)
            const filterBtns = document.querySelectorAll('#tag-filters .filter-btn');
            if(t.filterTags && filterBtns.length > 0) {
                const currentActiveTag = document.querySelector('#tag-filters .filter-btn.active');
                const activeTagText = currentActiveTag ? currentActiveTag.getAttribute('data-tag') : null;
                filterBtns.forEach((btn, i) => {
                    if(t.filterTags[i]) {
                        btn.textContent = t.filterTags[i];
                        btn.setAttribute('data-tag', t.filterTags[i]);
                    }
                });
                // Restore active state
                if(activeTagText) {
                    const langMap = { 'zh-CN': ['全部', '工作', '开发', '设计', '技术', '创意'], 'zh-TW': ['全部', '工作', '開發', '設計', '技術', '創意'], 'en': ['All', 'Work', 'Dev', 'Design', 'Tech', 'Creative'] };
                    const localizedActive = langMap[lang] ? langMap[lang].find(t => t === activeTagText || (langMap['zh-CN'] && langMap['zh-CN'][langMap[lang].indexOf(t)] === activeTagText)) : activeTagText;
                    // Find the button with matching data-tag and make it active
                    filterBtns.forEach(btn => {
                        if(btn.textContent === activeTagText || btn.getAttribute('data-tag') === activeTagText) {
                            filterBtns.forEach(b => b.classList.remove('active'));
                            btn.classList.add('active');
                        }
                    });
                }
            }
            // Sort buttons
            const sortBtns = document.querySelectorAll('#sort-buttons .filter-btn');
            if(sortBtns[0]) sortBtns[0].textContent = t.newest;
            if(sortBtns[1]) sortBtns[1].textContent = t.oldest;
            if(sortBtns[2]) sortBtns[2].textContent = t.byTag;
            // BrainStorm toggle button
            const toggleBtn = document.getElementById('brainstorm-toggle-btn');
            if(toggleBtn && toggleBtn.innerHTML.includes('fa-arrow-left')) {
                toggleBtn.innerHTML = '<i class="fas fa-arrow-left"></i> ' + t.backToMemoryCards;
            } else if(toggleBtn) {
                toggleBtn.innerHTML = '🧠 ' + t.brainstorm;
            }
            
            // BrainStorm 页面标题（如果当前在 BrainStorm 页面）
            const brainstormTitle = document.querySelector('#brainstorm-content h3');
            if(brainstormTitle && brainstormTitle.innerHTML.includes('BrainStorm')) {
                brainstormTitle.innerHTML = '<i class="fas fa-folder-tree"></i> ' + t.brainstorm;
            }
            
            // Action buttons (refresh, back, model panel)
            const actionBtns = document.querySelectorAll('.action-btn');
            actionBtns.forEach(btn => {
                const text = btn.textContent.trim();
                // 刷新数据按钮
                if(text.includes('刷新数据') || text.includes('刷新數據') || text.includes('Refresh')) {
                    btn.textContent = '🔄 ' + t.refresh;
                }
                // 返回记忆列表/卡片按钮
                else if(text.includes('返回记忆列表') || text.includes('返回記憶列表') || text.includes('返回记忆卡片') || text.includes('返回記憶卡片') || text.includes('Back to Memory')) {
                    btn.innerHTML = '<i class="fas fa-arrow-left"></i> ' + t.backToMemoryCards;
                }
                // 模型面板按钮
                else if(text.includes('模型面板') || text.includes('Model Panel')) {
                    btn.innerHTML = '🔙 ' + t.modelPanel;
                }
            });
            
            // Reload recent activity for language change
            loadRecentActivity();
            
            // 重新渲染记忆卡片（更新标签显示）
            renderPage();
            
            // 如果当前在 BrainStorm 视图，重新渲染文件夹名称
            const brainstormContent = document.getElementById('brainstorm-content');
            if (brainstormContent && brainstormContent.style.display !== 'none' && brainstormContent.querySelector('.file-tree')) {
                // 重新获取并渲染 BrainStorm 文件
                loadBrainStorm();
            }
        }
        
        // 语义搜索功能
        async function performSemanticSearch() {
            const searchInput = document.getElementById('search-input');
            const query = searchInput.value.trim();
            
            if (!query || query.length < 2) {
                alert('请输入至少2个字符的搜索词');
                return;
            }
            
            const container = document.getElementById('memory-list');
            container.innerHTML = '<div class="loading">System initializing... Searching neural cache</div>';
            
            try {
                const response = await fetch('/api/memory/search?q=' + encodeURIComponent(query));
                const data = await response.json();
                
                if (data.success && data.results && data.results.length > 0) {
                    let html = `
                        <div class="semantic-results">
                            <div class="result-header">
                                <span style="margin-right: 15px;">⌬ SEARCH COMPLETE</span>
                                <span style="color: var(--cp-primary); text-shadow: 0 0 10px var(--cp-primary);">${data.total} MATCHES FOUND</span>
                                <button class="filter-btn" onclick="loadMemoryFiles()" style="float: right; font-size: 10px; padding: 5px 10px;">RESET</button>
                            </div>
                            <div style="font-size: 11px; color: var(--cp-info); font-family: 'Share Tech Mono', monospace; margin-bottom: 15px; opacity: 0.7;">> Query: "${data.query}"</div>
                            <div class="memory-list">
                    `;
                    
                    data.results.forEach((result, index) => {
                        const scorePercent = Math.round(result.score * 100);
                        const scoreColor = result.score > 0.8 ? '#00ff88' : (result.score > 0.6 ? '#ffd700' : '#ff6b6b');
                        
                        html += `
                            <div class="memory-item" onclick="loadBrainStormFile('${result.path}')" style="cursor: pointer;">
                                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                                    <div class="memory-title" style="color: var(--cp-primary); font-size: 16px;">
                                        📄 ${result.name}
                                    </div>
                                    <div style="font-size: 12px; color: ${scoreColor}; background: rgba(0,0,0,0.3); padding: 2px 8px; border-radius: 4px;">
                                        匹配度: ${scorePercent}%
                                    </div>
                                </div>
                                <div style="font-size: 11px; color: var(--cp-text-dim); margin-bottom: 8px;">
                                    📂 ${result.path} · 📦 ${result.source}
                                </div>
                                <div class="memory-preview" style="font-size: 13px; color: var(--cp-text-dim); line-height: 1.6;">
                                    ${result.preview.replace(/\n/g, '<br>')}
                                </div>
                            </div>
                        `;
                    });
                    
                    container.innerHTML = html;
                } else {
                    container.innerHTML = `
                        <div style="padding: 40px; text-align: center; color: var(--cp-text-dim);">
                            <div style="font-size: 48px; margin-bottom: 20px;">🤔</div>
                            <div>没有找到与 "${query}" 语义相关的记忆</div>
                            <div style="font-size: 12px; margin-top: 10px; opacity: 0.7;">尝试用不同的表达方式搜索</div>
                            <button class="filter-btn" onclick="loadMemoryFiles()" style="margin-top: 20px;">返回全部记忆</button>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('语义搜索失败:', error);
                container.innerHTML = `
                    <div style="padding: 40px; text-align: center; color: #ff6b6b;">
                        <div style="font-size: 48px; margin-bottom: 20px;">❌</div>
                        <div>语义搜索失败</div>
                        <div style="font-size: 12px; margin-top: 10px;">${error.message}</div>
                    </div>
                `;
            }
        }
        
        document.addEventListener('DOMContentLoaded', () => {
            loadMemoryFiles();
            loadRecentActivity();
            setupEventListeners();
            loadMinimaxUsage();
        });
        
        // 加载 MiniMax 配额
        async function loadMinimaxUsage() {
            try {
                const response = await fetch('/api/minimax-usage');
                const data = await response.json();
                
                const statusEl = document.getElementById('minimax-status');
                const containerEl = document.getElementById('minimax-usage');
                
                if (data.success) {
                    const total = parseInt(data.total) || 0;
                    const used = parseInt(data.used) || 0;
                    const percent = total > 0 ? Math.round(used / total * 100) : 0;
                    
                    statusEl.innerHTML = `M2.7: <span style="color: ${percent > 80 ? '#ff6b6b' : 'var(--cp-primary)'};">${used}/${total}</span> (${percent}%)`;
                    
                    if (percent > 80) {
                        containerEl.style.borderColor = 'rgba(255,107,107,0.5)';
                        containerEl.style.boxShadow = '0 0 15px rgba(255,107,107,0.2)';
                    }
                } else {
                    statusEl.textContent = data.error || 'Error';
                    statusEl.style.color = 'var(--cp-text-dim)';
                }
            } catch (error) {
                document.getElementById('minimax-status').textContent = 'Offline';
            }
        }
