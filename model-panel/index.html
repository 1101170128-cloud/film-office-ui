<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Model Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&family=Orbitron:wght@400;500;600;700&family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&family=Exo+2:wght@300;400;500;600;700&family=Titillium+Web:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --cp-bg: #0a0a0f;
            --cp-primary: #00ff88;
            --cp-primary-dim: #00cc6a;
            --cp-secondary: #ff6b9d;
            --cp-accent: #c792ea;
            --cp-warning: #ffd93d;
            --cp-danger: #ff5252;
            --cp-info: #00d4ff;
            --cp-text: #e0e0e0;
            --cp-text-dim: #666;
            --cp-border: #1a1a2e;
            --cp-glow-primary: rgba(0,255,136,0.4);
            --cp-glow-secondary: rgba(255,107,157,0.4);
            --cp-glow-accent: rgba(199,146,234,0.4);
        }
        
        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%);
            background-size: 100% 3px;
            z-index: 999;
            pointer-events: none;
            opacity: 0.25;
        }
        
        @keyframes flicker {
            0% { opacity: 0.96; }
            50% { opacity: 1; }
            100% { opacity: 0.97; }
        }
        
        body {
            animation: flicker 0.2s infinite;
            font-family: 'VT323', 'Courier New', monospace;
            background: 
                linear-gradient(rgba(10,10,15,0.75), rgba(10,10,15,0.85)),
                url('https://images-assets.nasa.gov/image/as17-146-22294/as17-146-22294~large.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            color: var(--cp-text);
            padding: 20px;
            font-size: 20px;
        }
        
        .container { max-width: 1600px; margin: 0 auto; }
        
        h1 {
            text-align: center;
            margin-bottom: 25px;
            font-family: 'Press Start 2P', cursive;
            font-size: 24px;
            padding: 22px 30px;
            border: 3px solid var(--cp-primary);
            background: linear-gradient(135deg, rgba(0,255,136,0.1) 0%, rgba(0,0,0,0.4) 50%, rgba(0,255,136,0.05) 100%);
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            white-space: nowrap;
            clip-path: polygon(20px 0, 100% 0, 100% calc(100% - 20px), calc(100% - 20px) 100%, 0 100%, 0 20px);
            box-shadow: 0 0 30px var(--cp-glow-primary), inset 0 0 40px rgba(0,255,136,0.1);
        }
        h1 .title-arrow {
            color: var(--cp-primary);
            animation: blink 1s infinite;
            font-size: 28px;
            text-shadow: 0 0 10px var(--cp-primary), 0 0 20px var(--cp-primary), 0 0 40px var(--cp-primary);
        }
        h1 .title-main {
            font-size: 24px;
            background: linear-gradient(135deg, #00ff88 0%, #00ffaa 50%, #00cc6a 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 10px rgba(0,255,136,0.5));
        }
        h1 .title-sub {
            font-size: 9px;
            color: var(--cp-accent);
            letter-spacing: 4px;
            text-transform: uppercase;
            text-shadow: 0 0 8px var(--cp-accent);
            margin-left: 12px;
            padding-left: 12px;
            border-left: 2px solid var(--cp-accent);
        }
        h1::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0,255,136,0.15), transparent);
            animation: titleShine 4s ease-in-out infinite;
        }
        @keyframes titleShine { 0%, 100% { left: -100%; } 50% { left: 100%; } }
        @keyframes blink { 0%, 50% { opacity: 1; } 51%, 100% { opacity: 0.15; } }
        
        .stats-bar { display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; }
        .stat-card {
            flex: 1; min-width: 150px;
            background: linear-gradient(135deg, rgba(10,10,15,0.8) 0%, rgba(20,20,30,0.6) 100%);
            border: 2px solid var(--cp-border);
            padding: 15px 20px;
            text-align: center;
            position: relative;
            clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
        }
        .stat-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--cp-primary), transparent);
        }
        .stat-card:hover { border-color: var(--cp-primary); box-shadow: 0 0 20px var(--cp-glow-primary); }
        .stat-label { font-size: 12px; color: var(--cp-text-dim); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px; }
        .stat-value { font-size: 28px; font-weight: bold; color: var(--cp-primary); text-shadow: 0 0 10px var(--cp-glow-primary); }
        .stat-value.pink { color: var(--cp-secondary); text-shadow: 0 0 10px var(--cp-glow-secondary); }
        
        .main-layout { display: flex; gap: 20px; margin-top: 25px; }
        .sessions-area { flex: 1; min-width: 0; }
        .sidebar { width: 320px; flex-shrink: 0; }
        @media (max-width: 1000px) { .main-layout { flex-direction: column; } .sidebar { width: 100%; } }
        
        .restart-container { text-align: center; margin-bottom: 20px; display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; }
        .restart-btn {
            padding: 16px 40px;
            border: 2px solid var(--cp-secondary);
            background: linear-gradient(135deg, rgba(255,107,157,0.1) 0%, rgba(255,107,157,0.02) 100%);
            color: var(--cp-secondary);
            font-size: 15px; font-weight: 600;
            cursor: pointer;
            transition: all 0.35s ease;
            font-family: 'VT323', monospace;
            text-transform: uppercase;
            letter-spacing: 5px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 15px rgba(255,107,157,0.3), inset 0 0 20px rgba(255,107,157,0.05);
            clip-path: polygon(15px 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%, 0 15px);
        }
        .restart-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,107,157,0.4), transparent);
            transition: left 0.7s;
        }
        .restart-btn::after {
            content: 'SYSTEM REBOOT';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(135deg, var(--cp-secondary) 0%, #ff8fb3 100%);
            color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            letter-spacing: 5px;
            transform: translateX(-100%);
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            clip-path: polygon(15px 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%, 0 15px);
        }
        .restart-btn:hover::before { left: 100%; }
        .restart-btn:hover::after { transform: translateX(0); }
        .restart-btn:hover {
            border-color: var(--cp-secondary);
            box-shadow: 0 0 40px rgba(255,107,157,0.6), 0 0 80px rgba(255,107,157,0.3), inset 0 0 40px rgba(255,107,157,0.2);
        }
        
        .memory-btn { 
            display: inline-block; 
            padding: 12px 30px; 
            background: linear-gradient(45deg, rgba(0,212,255,0.1), rgba(199,146,234,0.1)); 
            border: 2px solid var(--cp-info); 
            color: var(--cp-info); 
            font-family: 'Orbitron', sans-serif; 
            font-size: 14px; 
            font-weight: 700; 
            letter-spacing: 2px; 
            text-transform: uppercase; 
            cursor: pointer; 
            position: relative; 
            overflow: hidden; 
            text-decoration: none; 
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(0,212,255,0.3), inset 0 0 20px rgba(0,212,255,0.05);
            clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
            animation: pulseGlowInfo 2s ease-in-out infinite;
        }
        .memory-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0,212,255,0.4), transparent);
            transition: left 0.7s;
        }
        .memory-btn::after {
            content: '🧠 MEMORY PANEL';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(45deg, var(--cp-info) 0%, var(--cp-accent) 100%);
            color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            letter-spacing: 2px;
            transform: translateX(-100%);
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
        }
        .memory-btn:hover::before { left: 100%; }
        .memory-btn:hover::after { transform: translateX(0); }
        .memory-btn:hover { 
            border-color: var(--cp-info);
            box-shadow: 0 0 40px rgba(0,212,255,0.6), 0 0 80px rgba(199,146,234,0.3), inset 0 0 40px rgba(0,212,255,0.2);
            transform: scale(1.05);
        }
        
        @keyframes pulseGlowInfo {
            0%, 100% { box-shadow: 0 0 15px rgba(0,212,255,0.3), inset 0 0 20px rgba(0,212,255,0.05); }
            50% { box-shadow: 0 0 25px rgba(0,212,255,0.5), inset 0 0 30px rgba(0,212,255,0.1); }
        }
        
        .qwen-btn { 
            display: inline-block; 
            padding: 12px 30px; 
            background: linear-gradient(45deg, rgba(255,215,0,0.1), rgba(255,140,0,0.1)); 
            border: 2px solid var(--cp-warning); 
            color: var(--cp-warning); 
            font-family: 'Orbitron', sans-serif; 
            font-size: 14px; 
            font-weight: 700; 
            letter-spacing: 2px; 
            text-transform: uppercase; 
            cursor: pointer; 
            position: relative; 
            overflow: hidden; 
            text-decoration: none; 
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(255,215,0,0.3), inset 0 0 20px rgba(255,215,0,0.05);
            clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
            animation: pulseGlowWarning 2s ease-in-out infinite;
        }
        .qwen-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,215,0,0.4), transparent);
            transition: left 0.7s;
        }
        .qwen-btn::after {
            content: '🔗 QWEN CONNECT';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(45deg, var(--cp-primary) 0%, #00cc6a 100%);
            color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            letter-spacing: 2px;
            transform: translateX(-100%);
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
        }
        .qwen-btn:hover::before { left: 100%; }
        .qwen-btn:hover::after { transform: translateX(0); }
        .qwen-btn:hover { 
            border-color: var(--cp-warning);
            box-shadow: 0 0 40px rgba(255,215,0,0.6), 0 0 80px rgba(255,140,0,0.3), inset 0 0 40px rgba(255,215,0,0.2);
            transform: scale(1.05);
        }
        
        @keyframes pulseGlowWarning {
            0%, 100% { box-shadow: 0 0 15px rgba(255,215,0,0.3), inset 0 0 20px rgba(255,215,0,0.05); }
            50% { box-shadow: 0 0 25px rgba(255,215,0,0.5), inset 0 0 30px rgba(255,215,0,0.1); }
        }

        .wiki-btn {
            display: inline-block;
            padding: 12px 30px;
            background: linear-gradient(45deg, rgba(255,149,0,0.1), rgba(255,200,0,0.1));
            border: 2px solid var(--cp-warning);
            color: var(--cp-warning);
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(255,149,0,0.3), inset 0 0 20px rgba(255,149,0,0.05);
            clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
            animation: pulseGlowWarning 2s ease-in-out infinite;
        }
        .wiki-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,149,0,0.4), transparent);
            transition: left 0.7s;
        }
        .wiki-btn::after {
            content: '📖 MAGI WIKI';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(45deg, var(--cp-warning) 0%, #ff8c00 100%);
            color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            letter-spacing: 2px;
            transform: translateX(-100%);
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
            z-index: 2;
        }
        .wiki-btn:hover::before { left: 100%; }
        .wiki-btn:hover::after { transform: translateX(0); }
        .wiki-btn:hover {
            border-color: var(--cp-warning);
            box-shadow: 0 0 40px rgba(255,149,0,0.6), 0 0 80px rgba(255,140,0,0.3), inset 0 0 40px rgba(255,149,0,0.2);
            transform: scale(1.05);
        }
        .wiki-btn .btn-text { position: relative; z-index: 1; color: var(--cp-warning) !important; font-family: 'Orbitron', sans-serif; font-size: 14px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; }
        
        @keyframes pulseGlowAmber {
            0%, 100% { box-shadow: 0 0 15px rgba(255,149,0,0.3), inset 0 0 20px rgba(255,149,0,0.05); }
            50% { box-shadow: 0 0 25px rgba(255,149,0,0.5), inset 0 0 30px rgba(255,149,0,0.1); }
        }
            0%, 100% { box-shadow: 0 0 15px rgba(255,215,0,0.3), inset 0 0 20px rgba(255,215,0,0.05); }
            50% { box-shadow: 0 0 25px rgba(255,215,0,0.5), inset 0 0 30px rgba(255,215,0,0.1); }
        }
            color: #fff;
        }
        
        .controls-bar {
            display: flex; gap: 15px; margin-bottom: 25px; flex-wrap: wrap; align-items: center;
            background: linear-gradient(135deg, rgba(10,10,15,0.9) 0%, rgba(20,20,30,0.7) 100%);
            padding: 18px 22px;
            border: 2px solid var(--cp-border);
            position: relative;
            overflow: hidden;
            clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
            box-shadow: 0 0 20px rgba(0,0,0,0.5), inset 0 0 30px rgba(0,255,136,0.03);
        }
        .controls-bar::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--cp-primary), var(--cp-accent), transparent);
            animation: scanline 3s linear infinite;
        }
        @keyframes scanline { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
        
        .controls-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
            background: linear-gradient(135deg, rgba(10,10,15,0.95) 0%, rgba(20,20,30,0.85) 100%);
            padding: 20px;
            border: 2px solid var(--cp-border);
            position: relative;
            overflow: hidden;
            clip-path: polygon(15px 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%, 0 15px);
            box-shadow: 0 0 20px rgba(0,0,0,0.5), inset 0 0 40px rgba(0,255,136,0.05);
        }
        .controls-bar::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--cp-primary), var(--cp-info), var(--cp-accent), transparent);
            animation: scanline 4s linear infinite;
            filter: blur(1px);
        }
        
        .filter-section {
            padding: 10px;
            position: relative;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.2);
            clip-path: polygon(8px 0, 100% 0, 100% calc(100% - 8px), calc(100% - 8px) 100%, 0 100%, 0 8px);
        }
        
        .filter-label {
            font-family: 'Orbitron', sans-serif;
            font-size: 12px;
            color: var(--cp-info);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(0,212,255,0.8);
            font-weight: 600;
        }
        
        /* 终端搜索框 */
        .search-terminal {
            display: flex;
            align-items: center;
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--cp-border);
            position: relative;
            clip-path: polygon(5px 0, 100% 0, 100% calc(100% - 5px), calc(100% - 5px) 100%, 0 100%, 0 5px);
        }
        .terminal-prompt {
            padding: 10px 12px;
            font-family: 'Share Tech Mono', monospace;
            color: var(--cp-primary);
            background: rgba(0,0,0,0.3);
            font-weight: bold;
            border-right: 1px solid var(--cp-border);
        }
        .terminal-input {
            flex: 1;
            padding: 10px 12px;
            background: transparent;
            border: none;
            color: var(--cp-text);
            font-family: 'Share Tech Mono', monospace;
            font-size: 14px;
            letter-spacing: 1px;
        }
        .terminal-input:focus {
            outline: none;
        }
        .terminal-input::placeholder {
            color: var(--cp-text-dim);
            font-family: 'Share Tech Mono', monospace;
        }
        .terminal-status {
            padding: 8px 12px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 10px;
            color: var(--cp-primary);
            background: rgba(0,255,136,0.1);
            border-left: 1px solid var(--cp-border);
            white-space: nowrap;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        /* 选择网格 */
        .select-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }
        .select-option {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--cp-border);
            cursor: pointer;
            transition: all 0.2s ease;
            clip-path: polygon(5px 0, 100% 0, 100% calc(100% - 5px), calc(100% - 5px) 100%, 0 100%, 0 5px);
        }
        .select-option:hover {
            background: rgba(0,255,136,0.1);
            border-color: var(--cp-primary);
        }
        .select-option.active {
            background: rgba(0,255,136,0.2);
            border-color: var(--cp-primary);
            box-shadow: 0 0 10px rgba(0,255,136,0.3);
        }
        .option-indicator {
            width: 8px;
            height: 8px;
            background: var(--cp-border);
            clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
            transition: all 0.2s ease;
        }
        .select-option.active .option-indicator {
            background: var(--cp-primary);
            box-shadow: 0 0 8px var(--cp-primary);
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .option-text {
            font-family: 'Share Tech Mono', monospace;
            font-size: 12px;
            color: var(--cp-text);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .select-option.active .option-text {
            color: var(--cp-primary);
            font-weight: bold;
        }
        
        /* 模型按钮 */
        .model-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .model-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--cp-border);
            cursor: pointer;
            transition: all 0.2s ease;
            clip-path: polygon(4px 0, 100% 0, 100% calc(100% - 4px), calc(100% - 4px) 100%, 0 100%, 0 4px);
        }
        .model-btn:hover {
            background: rgba(0,212,255,0.1);
            border-color: var(--cp-info);
        }
        .model-btn.active {
            background: rgba(0,212,255,0.2);
            border-color: var(--cp-info);
            box-shadow: 0 0 10px rgba(0,212,255,0.3);
        }
        .btn-indicator {
            width: 6px;
            height: 6px;
            background: var(--cp-border);
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
            transition: all 0.2s ease;
        }
        .model-btn.active .btn-indicator {
            background: var(--cp-info);
            box-shadow: 0 0 6px var(--cp-info);
            animation: spin 4s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .btn-text {
            font-family: 'Share Tech Mono', monospace;
            font-size: 11px;
            color: var(--cp-text);
            letter-spacing: 1px;
        }
        .model-btn.active .btn-text {
            color: var(--cp-info);
            font-weight: bold;
        }

        function getIcon(name, cls) {
            var svg = iconData[name] || '';
            if (cls && svg) {
                svg = svg.replace('class="', 'class="' + cls + ' ');
            }
            return svg;
        }
        
        function changeLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('preferredLang', lang);
            // 同步更新所有语言选择器
            document.querySelectorAll('.lang-select').forEach(function(select) {
                select.value = lang;
            });
            loadData();
            updateI18nText();
            updateStaticText();
        }
        
        // 更新所有带 data-i18n 属性的元素
        function updateI18nText() {
            document.querySelectorAll('[data-i18n]').forEach(function(el) {
                var key = el.getAttribute('data-i18n');
                el.textContent = t(key);
            });
        }
        
        function updateStaticText() {
            // 统计卡片标题
            document.querySelectorAll('.stat-label[data-i18n]').forEach(function(el) {
                el.textContent = t(el.getAttribute('data-i18n'));
            });
            document.getElementById('search-input').placeholder = t('searchPlaceholder');
            document.querySelector('.control-group:nth-child(1) .control-label').innerHTML = getIcon('search');
            document.querySelector('.control-group:nth-child(2) .control-label').textContent = t('kind');
            document.querySelector('.control-group:nth-child(3) .control-label').textContent = t('model');
            document.querySelector('.restart-btn').textContent = t('reboot');
            document.querySelector('.sidebar-card:nth-child(1) .sidebar-title').innerHTML = getIcon('target') + ' ' + t('minimaxQuota');
            document.querySelector('.sidebar-card:nth-child(2) .sidebar-title').innerHTML = getIcon('bar-chart-2') + ' ' + t('modelDist');
            document.querySelector('.sidebar-card:nth-child(3) .sidebar-title').innerHTML = getIcon('file-text') + ' ' + t('recentLogs');
            // Update filter options
            document.querySelectorAll('.select-option .option-text').forEach(function(el, idx) {
                var keys = ['kindAll', 'kindMain', 'kindCron', 'kindFeishu'];
                if (keys[idx]) el.textContent = t(keys[idx]);
            });
            
            var allBtn = document.querySelector('.model-btn[data-value="all"] .btn-text');
            if (allBtn) allBtn.textContent = t('modelAll');
            // Update hide zero button text
            var hideZeroTxt = document.getElementById('hide-zero-text');
            if (hideZeroTxt) {
                hideZeroTxt.textContent = currentFilters.hideZeroMessages ? t('hideZeroHideEmpty') : t('hideZeroShowAll');
            }
            // Update action icons
            var refreshIcon = document.getElementById('refresh-icon');
            if (refreshIcon) refreshIcon.innerHTML = getIcon('refresh-cw');
            var hideZeroIcon = document.getElementById('hide-zero-icon');
            if (hideZeroIcon) hideZeroIcon.innerHTML = getIcon(currentFilters.hideZeroMessages ? 'eye-off' : 'eye');
            var clearIcon = document.getElementById('clear-icon');
            if (clearIcon) clearIcon.innerHTML = getIcon('trash');
        }
        
        // Load preferred language
        const savedLang = localStorage.getItem('preferredLang');
        if (savedLang && i18n[savedLang]) {
            currentLang = savedLang;
            // 更新所有语言选择器
            document.querySelectorAll('.lang-select').forEach(function(select) {
                select.value = savedLang;
            });
            // 应用翻译到所有界面元素
            updateI18nText();
            updateStaticText();
        }
        
        const AVAILABLE_MODELS = [
            { value: 'k2p5', label: 'Kimi K2.5' },
            { value: 'default', label: '默认模型' },
            { value: 'moonshot/kimi-k2.5', label: 'Moonshot Kimi K2.5' },
            { value: 'minimax-portal/MiniMax-M2.7', label: 'MiniMax M2.7' },
            { value: 'qwen-portal/coder-model', label: 'Qwen Coder' }
        ];

        let allSessions = [];
        let currentFilters = { search: '', kind: 'all', model: 'all', hideZeroMessages: false };

        function getModelClass(model) {
            var m = (model || 'default').toLowerCase();
            if (m.includes('kimi') || m.includes('k2p5')) return 'kimi';
            if (m.includes('minimax')) return 'minimax';
            if (m.includes('qwen') || m.includes('coder')) return 'qwen';
            return 'default';
        }

        function isModelSelected(sessionModel, optionValue) {
            if (!sessionModel) return optionValue === 'default';
            return sessionModel === optionValue || sessionModel.includes(optionValue) || optionValue.includes(sessionModel);
        }

        // 类型选择函数
        function selectType(type) {
            var options = document.querySelectorAll('.select-option');
            options.forEach(function(option) {
                var indicator = option.querySelector('.option-indicator');
                var value = option.getAttribute('data-value');
                if (value === type) {
                    indicator.classList.add('active');
                    option.classList.add('active');
                } else {
                    indicator.classList.remove('active');
                    option.classList.remove('active');
                }
            });
            currentFilters.kind = type;
            applyFilters();
        }
        
        // 模型选择函数
        function selectModel(model) {
            var buttons = document.querySelectorAll('.model-btn');
            buttons.forEach(function(button) {
                var indicator = button.querySelector('.btn-indicator');
                var value = button.getAttribute('data-value');
                if (value === model) {
                    indicator.classList.add('active');
                    button.classList.add('active');
                } else {
                    indicator.classList.remove('active');
                    button.classList.remove('active');
                }
            });
            currentFilters.model = model;
            applyFilters();
        }
        
        function applyFilters() {
            currentFilters.search = document.getElementById('search-input').value;
            
            updateSearchStatus();
            updateFilterDisplay();
            applyFiltersAndRender();
        }
        
        function updateSearchStatus() {
            var searchInput = document.getElementById('search-input');
            var statusEl = document.getElementById('search-status');
            var charCount = searchInput.value.length;
            
            if (charCount > 0) {
                statusEl.textContent = charCount + ' CHARS';
                statusEl.style.color = 'var(--cp-primary)';
            } else {
                statusEl.textContent = 'QUERY READY';
                statusEl.style.color = 'var(--cp-text-dim)';
            }
        }
        
        function updateFilterDisplay() {
            var tagsEl = document.getElementById('filter-tags');
            var activeFilters = [];
            
            if (currentFilters.search) {
                activeFilters.push({
                    type: 'search',
                    value: currentFilters.search,
                    label: 'SEARCH: "' + currentFilters.search + '"'
                });
            }
            
            if (currentFilters.kind !== 'all') {
                var kindLabels = {
                    'main': 'MAIN SESSION',
                    'cron': 'CRON JOB', 
                    'feishu': 'FEISHU'
                };
                activeFilters.push({
                    type: 'kind',
                    value: currentFilters.kind,
                    label: 'TYPE: ' + (kindLabels[currentFilters.kind] || currentFilters.kind.toUpperCase())
                });
            }
            
            if (currentFilters.model !== 'all') {
                activeFilters.push({
                    type: 'model',
                    value: currentFilters.model,
                    label: 'MODEL: ' + currentFilters.model.toUpperCase()
                });
            }
            
            if (activeFilters.length === 0) {
                tagsEl.innerHTML = '<div class="filter-tag empty">NO FILTERS ACTIVE</div>';
            } else {
                tagsEl.innerHTML = '';
                activeFilters.forEach(function(filter) {
                    var tag = document.createElement('div');
                    tag.className = 'filter-tag';
                    tag.innerHTML = filter.label + '<span class="remove-tag" onclick="removeFilter(\'' + filter.type + '\')"> ×</span>';
                    tagsEl.appendChild(tag);
                });
            }
        }
        
        function removeFilter(type) {
            switch(type) {
                case 'search':
                    document.getElementById('search-input').value = '';
                    break;
                case 'kind':
                    selectType('all');
                    break;
                case 'model':
                    selectModel('all');
                    break;
            }
            applyFilters();
        }
        
        function updateModelFilterOptions() {
            var buttonsEl = document.getElementById('model-buttons');
            buttonsEl.innerHTML = '';
            
            var models = ['all'];
            allSessions.forEach(function(s) {
                var m = s.model || 'default';
                if (!models.includes(m)) models.push(m);
            });
            
            models.forEach(function(model) {
                var btn = document.createElement('div');
                btn.className = 'model-btn';
                btn.setAttribute('data-value', model);
                btn.onclick = function() { selectModel(model); };
                
                var indicator = document.createElement('span');
                indicator.className = 'btn-indicator';
                if (model === 'all') indicator.classList.add('active');
                
                var text = document.createElement('span');
                text.className = 'btn-text';
                text.textContent = model.toUpperCase();
                
                btn.appendChild(indicator);
                btn.appendChild(text);
                buttonsEl.appendChild(btn);
                
                if (model === 'all') btn.classList.add('active');
            });
        }

        async function loadData() {
            var content = document.getElementById('content');
            content.innerHTML = '<div class="loading">' + t('loading') + '</div>';

            try {
                var res = await fetch('http://localhost:19000/api/sessions?_=' + Date.now());
                if (!res.ok) throw new Error('Network response was not ok: ' + res.status);
                var data = await res.json();
                if (!data) throw new Error('No data received');
                
                if (data.error) { content.innerHTML = '<div class="no-results">错误：' + data.error + '</div>'; return; }
                
                allSessions = data.sessions || [];
                updateModelFilterOptions();
                applyFiltersAndRender();
                loadRecentLogs();
                loadMinimaxUsage();
            } catch (err) { content.innerHTML = '<div class="no-results">加载失败：' + err.message + '</div>'; }
        }
        
        async function loadMinimaxUsage() {
            try {
                var res = await fetch('http://localhost:19000/api/minimax-usage?_=' + Date.now());
                var data = await res.json();
                if (data.success) {
                    document.getElementById('minimax-bar').style.width = data.percent + '%';
                    document.getElementById('minimax-used').textContent = data.used + ' / ' + data.total;
                    document.getElementById('minimax-percent').textContent = data.percent + '%';
                    if (data.remaining !== undefined) document.getElementById('minimax-remaining').textContent = '剩余 ' + data.remaining;
                    if (data.weekly_used !== undefined) document.getElementById('minimax-weekly').textContent = '周 ' + data.weekly_used + ' / ' + data.weekly_total;
                }
            } catch (err) {}
        }
        
        async function loadRecentLogs() {
            var container = document.getElementById('recent-logs');
            try {
                var res = await fetch('http://localhost:19000/api/recent-logs?_=' + Date.now());
                var data = await res.json();
                if (data.logs && data.logs.length > 0) {
                    var html = '';
                    data.logs.forEach(function(log) {
                        html += '<div class="log-date">' + getIcon('calendar') + ' ' + log.date + '</div>';
                        log.items.slice(0, 3).forEach(function(item) {
                            html += '<div class="log-item">• ' + item.substring(0, 40) + '</div>';
                        });
                    });
                    container.innerHTML = html;
                } else { container.innerHTML = '<div class="log-item">暂无日志</div>'; }
            } catch (err) { container.innerHTML = '<div class="log-item">加载失败</div>'; }
        }

        function updateModelFilterOptions() {
            var modelSet = {};
            allSessions.forEach(function(s) { 
                var m = s.model || 'default'; 
                modelSet[m] = true; 
            });
            
            // 更新模型按钮组
            var container = document.getElementById('model-buttons');
            if (!container) return;
            
            var currentVal = currentFilters.model || 'all';
            var html = '<div class="model-btn" data-value="all" onclick="selectModel(\'all\')"><span class="btn-indicator ' + (currentVal === 'all' ? 'active' : '') + '"></span><span class="btn-text">ALL</span></div>';
            
            Object.keys(modelSet).sort().forEach(function(model) {
                var isActive = currentVal === model;
                html += '<div class="model-btn" data-value="' + model + '" onclick="selectModel(\'' + model + '\')"><span class="btn-indicator ' + (isActive ? 'active' : '') + '"></span><span class="btn-text">' + model + '</span></div>';
            });
            
            container.innerHTML = html;
        }

        function applyFilters() {
            currentFilters.search = document.getElementById('search-input').value;
            // kind 和 model 通过点击事件更新，不需要从 select 读取
            
            updateFilterStatus();
            updateSearchStatus();
            applyFiltersAndRender();
        }
        
        function updateFilterStatus() {
            var activeFilters = [];
            var statusEl = document.getElementById('filter-status');
            var filtersEl = document.getElementById('active-filters');
            
            if (currentFilters.search) {
                activeFilters.push({
                    type: 'search',
                    value: currentFilters.search,
                    label: '搜索: ' + currentFilters.search
                });
            }
            if (currentFilters.kind !== 'all') {
                var kindLabels = {
                    'main': '主会话',
                    'cron': '定时任务', 
                    'feishu': '飞书'
                };
                activeFilters.push({
                    type: 'kind',
                    value: currentFilters.kind,
                    label: '类型: ' + (kindLabels[currentFilters.kind] || currentFilters.kind)
                });
            }
            if (currentFilters.model !== 'all') {
                activeFilters.push({
                    type: 'model',
                    value: currentFilters.model,
                    label: '模型: ' + currentFilters.model
                });
            }
            
            if (activeFilters.length > 0) {
                statusEl.classList.add('active');
                filtersEl.innerHTML = '';
                
                activeFilters.forEach(function(filter) {
                    var chip = document.createElement('div');
                    chip.className = 'filter-chip';
                    chip.innerHTML = filter.label + '<span class="remove" onclick="removeFilter(\'' + filter.type + '\')">×</span>';
                    filtersEl.appendChild(chip);
                });
            } else {
                statusEl.classList.remove('active');
                filtersEl.innerHTML = '';
            }
        }
        
        function updateSearchStatus() {
            var searchInput = document.getElementById('search-input');
            var statusEl = document.getElementById('search-status');
            var charCount = searchInput.value.length;
            
            if (charCount > 0) {
                statusEl.textContent = charCount + ' 字符';
            } else {
                statusEl.textContent = '';
            }
        }
        
        function removeFilter(type) {
            switch(type) {
                case 'search':
                    document.getElementById('search-input').value = '';
                    currentFilters.search = '';
                    break;
                case 'kind':
                    currentFilters.kind = 'all';
                    // 重置按钮状态
                    document.querySelectorAll('.select-option .option-indicator').forEach(function(el) {
                        el.classList.remove('active');
                    });
                    document.querySelector('.select-option[data-value="all"] .option-indicator').classList.add('active');
                    break;
                case 'model':
                    selectModel('all');
                    break;
            }
            applyFilters();
        }

        function applyFiltersAndRender() {
            var filtered = allSessions.slice();
            
            if (currentFilters.search) {
                var search = currentFilters.search.toLowerCase();
                filtered = filtered.filter(function(s) { 
                    return (s.displayName && s.displayName.toLowerCase().includes(search)) ||
                           (s.sessionKey && s.sessionKey.toLowerCase().includes(search)); 
                });
            }
            if (currentFilters.kind !== 'all') filtered = filtered.filter(function(s) { return s.kind === currentFilters.kind; });
            if (currentFilters.model !== 'all') {
                filtered = filtered.filter(function(s) { 
                    return s.model === currentFilters.model || 
                          (!s.model && currentFilters.model === 'default');
                });
            }
            if (currentFilters.hideZeroMessages) {
                filtered = filtered.filter(function(s) { return (s.messageCount || 0) > 0; });
            }
            
            renderData(filtered);
        }

        function renderData(sessions) {
            document.getElementById('total-sessions').textContent = allSessions.length;
            document.getElementById('filtered-count').textContent = sessions.length !== allSessions.length ? '(显示 ' + sessions.length + ' 个)' : '';
            
            var totalMessages = allSessions.reduce(function(sum, s) { return sum + (s.messageCount || 0); }, 0);
            document.getElementById('total-messages').textContent = totalMessages.toLocaleString();
            
            var modelCount = {};
            allSessions.forEach(function(s) { var m = s.model || 'default'; modelCount[m] = (modelCount[m] || 0) + 1; });
            var html = '';
            Object.keys(modelCount).slice(0, 5).forEach(function(m) { html += '<span class="model-tag ' + getModelClass(m) + '">' + m + ': ' + modelCount[m] + '</span>'; });
            document.getElementById('model-dist').innerHTML = html;
            
            var content = document.getElementById('content');
            if (sessions.length === 0) { content.innerHTML = '<div class="no-results">' + t('noResults') + '</div>'; return; }

            var grid = document.createElement('div');
            grid.className = 'session-grid';
            sessions.forEach(function(session) { grid.appendChild(createSessionCard(session)); });
            content.innerHTML = '';
            content.appendChild(grid);
        }

        function createSessionCard(session) {
            var card = document.createElement('div');
            card.className = 'session-card';
            var typeLabel = { 'main': t('kindMain'), 'cron': t('kindCron'), 'feishu': t('kindFeishu'), 'dreaming': '梦境' }[session.kind] || session.kind;
            var typeIcons = { 'main': 'home', 'cron': 'clock', 'feishu': 'message-circle', 'dreaming': 'moon' };
            var icon = getIcon(typeIcons[session.kind]) || getIcon('folder');
            var shortNameMap = { 'dreaming': '梦境', 'Dreaming': '梦境' };
            var displayName = shortNameMap[session.displayName] || session.displayName;
            var modelOptions = AVAILABLE_MODELS.map(function(m) { 
                return '<option value="' + m.value + '" ' + (isModelSelected(session.model, m.value) ? 'selected' : '') + '>' + m.label + '</option>';
            }).join('');
            var updatedTime = session.updatedAt ? new Date(session.updatedAt).toLocaleString('zh-CN') : '-';
            // Build info rows - remark first
            var infoHtml = '';
            if (session.remark && session.remark.trim()) {
                infoHtml += '<div class="info-row" style="background:linear-gradient(90deg,rgba(199,146,234,0.12) 0%,rgba(255,107,157,0.08) 100%);padding:12px 14px;border-left:3px solid var(--cp-accent);margin:10px 0;border-radius:0 6px 6px 0;box-shadow:0 2px 12px rgba(199,146,234,0.15) inset;"><span style="color:var(--cp-accent);font-weight:600;font-size:13px;letter-spacing:0.3px;">' + getIcon('file-text') + ' ' + session.remark.substring(0, 80) + '</span></div>';
            } else {
                infoHtml += '<div class="info-row" style="background:rgba(0,255,136,0.05);padding:8px;margin:8px 0;border:1px dashed rgba(0,255,136,0.3);"><span style="color:var(--cp-primary);font-size:13px">' + t('noSummary') + '</span><span style="color:var(--cp-text-dim);font-size:11px;margin-left:8px">' + t('summaryHint') + '</span></div>';
            }
            // Add note input
            var note = session.note || '';
            infoHtml += '<div class="note-section" style="margin:12px 0;padding:12px;background:linear-gradient(135deg,rgba(255,193,7,0.08) 0%,rgba(255,160,0,0.05) 100%);border:1px solid rgba(255,193,7,0.25);border-radius:6px;box-shadow:0 2px 12px rgba(255,193,7,0.1) inset;">';
            infoHtml += '<div style="color:#ffc107;font-size:11px;margin-bottom:6px;font-weight:700;letter-spacing:1px;text-transform:uppercase;">' + (currentLang === 'en' ? 'Note' : (currentLang === 'zh-TW' ? '備註' : '备注')) + '</div>';
            infoHtml += '<input type="text" id="note-' + session.sessionKey + '" value="' + note + '" placeholder="' + (currentLang === 'en' ? 'Add a note...' : (currentLang === 'zh-TW' ? '添加備註...' : '添加备注...')) + '" style="width:100%;padding:8px 10px;background:rgba(0,0,0,0.4);border:1px solid rgba(255,193,7,0.4);color:#ffd54f;border-radius:4px;font-size:13px;letter-spacing:0.5px;transition:all 0.3s;" onfocus="this.style.borderColor=\'rgba(255,193,7,0.8)\';this.style.boxShadow=\'0 0 10px rgba(255,193,7,0.3)\'" onblur="this.style.borderColor=\'rgba(255,193,7,0.4)\';this.style.boxShadow=\'none\'" onkeypress="if(event.key===\'Enter\')saveNote(\'' + session.sessionKey + '\')">';
            infoHtml += '<button onclick="saveNote(\'' + session.sessionKey + '\')" style="margin-top:6px;padding:5px 14px;background:linear-gradient(135deg,rgba(255,193,7,0.25) 0%,rgba(255,160,0,0.15) 100%);border:1px solid rgba(255,193,7,0.6);color:#ffc107;border-radius:4px;font-size:12px;cursor:pointer;letter-spacing:1px;transition:all 0.3s;">' + (currentLang === 'en' ? 'Save' : (currentLang === 'zh-TW' ? '保存' : '保存')) + '</button>';
            infoHtml += '</div>';
            infoHtml += '<div class="info-row"><span class="info-label">' + t('sessionId') + '</span><span class="info-value">' + (session.sessionId ? session.sessionId.substring(0, 8) : '-') + '</span></div>';
            infoHtml += '<div class="info-row"><span class="info-label">' + t('model') + '</span><span class="info-value model ' + getModelClass(session.model) + '">' + (session.model || 'default') + '</span></div>';
            if (session.provider) {
                infoHtml += '<div class="info-row"><span class="info-label">' + t('provider') + '</span><span class="info-value" style="color:var(--cp-secondary)">' + session.provider + '</span></div>';
            }
            infoHtml += '<div class="info-row"><span class="info-label">' + t('messageCount') + '</span><span class="info-value">' + (session.messageCount || 0) + '</span></div>';
            infoHtml += '<div class="info-row"><span class="info-label">' + t('updateTime') + '</span><span class="nixie-time">' + updatedTime + '</span></div>';
            
            card.innerHTML = 
                '<div class="session-header">' +
                    '<div class="session-name">' + icon + ' ' + (displayName || '未命名') + '</div>' +
                    '<div class="session-type ' + session.kind + '">' + typeLabel + '</div>' +
                '</div>' +
                infoHtml +
                '<div class="model-selector"><label>' + t('switchModel') + '</label>' +
                '<select class="model-select" id="model-' + session.sessionKey + '">' + modelOptions + '</select>' +
                '<button class="apply-btn" onclick="applyModel(\'' + session.sessionKey + '\')">' + t('apply') + '</button></div>';
            return card;
        }

        async function saveNote(sessionKey) {
            var input = document.getElementById('note-' + sessionKey);
            var note = input.value.trim();
            var btn = input.nextElementSibling;
            var originalText = btn.textContent;
            btn.textContent = '...';
            btn.disabled = true;
            
            try {
                var res = await fetch('http://localhost:19000/api/set-note', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sessionKey: sessionKey, note: note })
                });
                var data = await res.json();
                if (data.success) {
                    btn.textContent = '✓';
                    btn.style.background = 'rgba(0,255,136,0.3)';
                    setTimeout(() => {
                        btn.textContent = originalText;
                        btn.style.background = 'rgba(255,193,7,0.2)';
                        btn.disabled = false;
                    }, 1000);
                } else {
                    btn.textContent = '✗';
                    setTimeout(() => {
                        btn.textContent = originalText;
                        btn.disabled = false;
                    }, 1000);
                }
            } catch (err) {
                btn.textContent = '✗';
                setTimeout(() => {
                    btn.textContent = originalText;
                    btn.disabled = false;
                }, 1000);
            }
        }

        async function applyModel(sessionKey) {
            var select = document.getElementById('model-' + sessionKey);
            var newModel = select.value;
            try {
                var res = await fetch('http://localhost:19000/api/set-model', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sessionKey: sessionKey, model: newModel })
                });
                var data = await res.json();
                if (data.success) { alert(t('modelUpdated')); loadData(); }
                else { 
                    // 显示切换指令供用户复制
                    var cmd = getModelCommand(newModel);
                    showCopyCommandModal(cmd, newModel);
                }
            } catch (err) { 
                var cmd = getModelCommand(newModel);
                showCopyCommandModal(cmd, newModel);
            }
        }
        
        // 自定义美化弹窗
        function showCopyCommandModal(cmd, modelName) {
            // 创建弹窗 HTML
            var modalHtml = `
                <div id="custom-modal" style="
                    position: fixed;
                    top: 0; left: 0; right: 0; bottom: 0;
                    background: rgba(0,0,0,0.8);
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    z-index: 10000;
                " onclick="if(event.target.id==='custom-modal')closeCustomModal()">
                    <div style="
                        background: linear-gradient(135deg, rgba(20,20,30,0.98) 0%, rgba(30,30,45,0.95) 100%);
                        border: 2px solid var(--cp-primary);
                        border-radius: 12px;
                        padding: 30px;
                        max-width: 450px;
                        width: 90%;
                        box-shadow: 0 0 40px rgba(0,255,136,0.3), 0 0 80px rgba(0,255,136,0.1);
                        position: relative;
                        clip-path: polygon(15px 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%, 0 15px);
                    ">
                        <h3 style="
                            color: var(--cp-primary);
                            font-family: 'Orbitron', sans-serif;
                            font-size: 18px;
                            margin-bottom: 20px;
                            text-transform: uppercase;
                            letter-spacing: 2px;
                        ">' + getIcon('zap') + ' 无法直接切换模型</h3>
                        <p style="color: var(--cp-text); margin-bottom: 15px; line-height: 1.6;">
                            请在对话中发送以下指令来切换模型：
                        </p>
                        <div style="
                            background: rgba(0,0,0,0.5);
                            border: 1px solid var(--cp-info);
                            border-radius: 6px;
                            padding: 15px;
                            margin: 20px 0;
                            text-align: center;
                        ">
                            <code id="copy-cmd" style="
                                color: var(--cp-info);
                                font-family: 'Share Tech Mono', monospace;
                                font-size: 16px;
                                letter-spacing: 1px;
                            ">${cmd}</code>
                        </div>
                        <div style="display: flex; gap: 15px; justify-content: center; margin-top: 20px;">
                            <button onclick="copyToClipboard('${cmd}');closeCustomModal();" style="
                                padding: 12px 25px;
                                background: linear-gradient(135deg, rgba(0,255,136,0.2) 0%, rgba(0,255,136,0.05) 100%);
                                border: 2px solid var(--cp-primary);
                                color: var(--cp-primary);
                                font-family: 'Orbitron', sans-serif;
                                font-size: 13px;
                                font-weight: 600;
                                letter-spacing: 2px;
                                cursor: pointer;
                                border-radius: 6px;
                                transition: all 0.3s ease;
                                text-transform: uppercase;
                            ">📋 复制指令</button>
                            <button onclick="closeCustomModal()" style="
                                padding: 12px 25px;
                                background: rgba(255,255,255,0.05);
                                border: 2px solid var(--cp-border);
                                color: var(--cp-text);
                                font-family: 'Orbitron', sans-serif;
                                font-size: 13px;
                                font-weight: 600;
                                letter-spacing: 2px;
                                cursor: pointer;
                                border-radius: 6px;
                                transition: all 0.3s ease;
                                text-transform: uppercase;
                            ">关闭</button>
                        </div>
                    </div>
                </div>
            `;
            
            // 移除已存在的弹窗
            var existing = document.getElementById('custom-modal');
            if (existing) existing.remove();
            
            // 添加弹窗到页面
            document.body.insertAdjacentHTML('beforeend', modalHtml);
        }
        
        function closeCustomModal() {
            var modal = document.getElementById('custom-modal');
            if (modal) modal.remove();
        }
        
        function copyToClipboard(text) {
            // 尝试使用 Clipboard API
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text).then(function() {
                    // 显示成功提示
                    var btn = event.target;
                    var originalText = btn.innerHTML;
                    btn.innerHTML = getIcon('check-circle') + ' 已复制!';
                    btn.style.background = 'linear-gradient(135deg, rgba(0,255,136,0.3) 0%, rgba(0,255,136,0.1) 100%)';
                    setTimeout(function() {
                        closeCustomModal();
                    }, 1000);
                }).catch(function() {
                    // 如果失败，使用备用方法
                    fallbackCopy(text);
                });
            } else {
                // 备用方法
                fallbackCopy(text);
            }
        }
        
        function fallbackCopy(text) {
            var textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed';
            textarea.style.opacity = '0';
            document.body.appendChild(textarea);
            textarea.select();
            try {
                document.execCommand('copy');
                var btn = event.target;
                var originalText = btn.innerHTML;
                btn.innerHTML = getIcon('check-circle') + ' 已复制!';
                setTimeout(function() {
                    closeCustomModal();
                }, 1000);
            } catch (err) {
                alert('复制失败，请手动复制: ' + text);
            }
            document.body.removeChild(textarea);
        }
        
        // 获取切换模型的指令
        function getModelCommand(model) {
            var cmds = {
                'k2p5': '/model kimi',
                'kimi-coding': '/model kimi',
                'minimax-portal/MiniMax-M2.7': '/model minimax',
                'qwen-portal/coder-model': '/model qwen'
            };
            return cmds[model] || '/model ' + model;
        }

        async function reconnectQwen() {
            var btn = document.querySelector('.qwen-btn');
            var originalText = btn.textContent;
            btn.textContent = 'CONNECTING...';
            btn.disabled = true;
            
            try {
                var res = await fetch('http://localhost:19000/api/reconnect-qwen', { method: 'POST' });
                var data = await res.json();
                if (data.success) {
                    alert(t('qwenConnected'));
                    btn.innerHTML = getIcon('check-circle') + ' CONNECTED';
                    setTimeout(() => {
                        btn.textContent = originalText;
                        btn.disabled = false;
                    }, 2000);
                } else {
                    alert(t('qwenFailed') + (data.error || 'Unknown error'));
                    btn.innerHTML = getIcon('x') + ' FAILED';
                    setTimeout(() => {
                        btn.textContent = originalText;
                        btn.disabled = false;
                    }, 2000);
                }
            } catch (err) {
                alert(t('requestFailed') + err.message);
                btn.innerHTML = getIcon('x') + ' ERROR';
                setTimeout(() => {
                    btn.textContent = originalText;
                    btn.disabled = false;
                }, 2000);
            }
        }

        async function restartGateway() {
            if (!confirm(t('confirmReboot'))) return;
            try {
                var res = await fetch('http://localhost:19000/api/restart-gateway', { method: 'POST' });
                var data = await res.json();
                alert(data.success ? t('rebootSent') : t('rebootFailed'));
            } catch (err) { alert(t('requestFailed')); }
        }

        function clearFilters() {
            document.getElementById('search-input').value = '';
            selectType('all');
            selectModel('all');
            currentFilters.hideZeroMessages = false;
            document.getElementById('hide-zero-text').textContent = t('hideZeroShowAll');
            document.getElementById('hide-zero-btn').classList.remove('active');
            var icon = document.getElementById('hide-zero-icon');
            if (icon) icon.innerHTML = getIcon('eye');
            applyFilters();
        }

        function toggleHideZero() {
            currentFilters.hideZeroMessages = !currentFilters.hideZeroMessages;
            var btn = document.getElementById('hide-zero-btn');
            var txt = document.getElementById('hide-zero-text');
            var icon = document.getElementById('hide-zero-icon');
            if (currentFilters.hideZeroMessages) {
                txt.textContent = 'Hide Empty';
                btn.classList.add('active');
                if (icon) icon.innerHTML = getIcon('eye-off');
            } else {
                txt.textContent = 'Show All';
                btn.classList.remove('active');
                if (icon) icon.innerHTML = getIcon('eye');
            }
            applyFilters();
        }

        setInterval(loadData, 30000);
